<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moment Troc · Studio</title>
<style>
:root {
  --ink:#F0EAD6; --paper:#0D0D0D; --card:#141414; --card2:#1C1C1C;
  --rust:#D4541A; --rust-dim:rgba(212,84,26,0.12); --rust-line:rgba(212,84,26,0.3);
  --ink-dim:rgba(240,234,214,0.25); --ink-mid:rgba(240,234,214,0.55);
  --line:rgba(240,234,214,0.07); --gold:#C9A84C; --green:#4a9e4a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--paper);color:var(--ink);
  font-family:'Space Mono','Courier New',monospace;
  min-height:100vh;padding:24px 16px 120px;max-width:720px;margin:0 auto;
}
.hidden{display:none!important;}
.center{text-align:center;}
.divider{height:1px;background:var(--line);margin:28px 0;}
h1{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;line-height:1;}
h1 em{font-style:italic;color:var(--rust);}
.eyebrow{font-size:0.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--rust);margin-bottom:8px;}
.sub{color:var(--ink-mid);font-size:0.9rem;line-height:1.6;margin:16px 0 24px;}
textarea,input{
  width:100%;background:var(--card2);border:1px solid var(--line);
  border-top:2px solid var(--ink-dim);color:var(--ink);
  padding:16px;font-family:inherit;font-size:1rem;
  resize:vertical;outline:none;line-height:1.7;border-radius:0;
}
textarea:focus,input:focus{border-top-color:var(--rust);}
textarea::placeholder,input::placeholder{color:var(--ink-dim);}
.btn{
  display:block;width:100%;padding:16px;border:none;
  font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:opacity .2s;margin-top:12px;
  font-family:'Archivo Black',sans-serif;
}
.btn-main{background:var(--rust);color:var(--ink);}
.btn-ghost{background:transparent;border:1px solid var(--rust-line);color:var(--rust);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.card{
  background:var(--card);border:1px solid var(--line);
  border-top:3px solid var(--rust);padding:20px;margin-bottom:20px;
}
.card.gold{border-top-color:var(--gold);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.tag{
  display:inline-block;background:var(--rust);color:var(--ink);
  font-size:0.7rem;letter-spacing:2px;padding:4px 10px;text-transform:uppercase;margin-right:6px;
}
.tag.gold{background:var(--gold);color:var(--paper);}
.tag.line{background:transparent;border:1px solid var(--line);color:var(--ink-dim);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.maitre-card{
  background:var(--card2);border:1px solid var(--line);border-top:3px solid var(--rust);
  padding:16px;cursor:pointer;transition:all .2s;text-align:center;
}
.maitre-card:hover{border-top-color:var(--ink);}
.maitre-card.selected{background:var(--rust-dim);border-color:var(--rust);}
.maitre-name{font-size:0.9rem;font-weight:700;margin-bottom:4px;}
.maitre-type{font-size:0.7rem;color:var(--ink-dim);}
.chat-bubble{
  background:var(--card);border:1px solid var(--line);
  padding:14px 18px;margin-bottom:12px;border-radius:2px;
}
.post-body{
  font-family:'Playfair Display',serif;font-size:1.1rem;
  line-height:1.9;white-space:pre-wrap;color:var(--ink);padding:24px 0;
}
.arsenal-item{background:var(--card);border:1px solid var(--line);padding:16px;margin-bottom:12px;}
.err-box{background:rgba(212,84,26,0.1);border-left:3px solid var(--rust);padding:14px 16px;margin:12px 0;font-size:0.9rem;color:var(--rust);}
.ok-box{background:rgba(74,158,74,0.1);border-left:3px solid var(--green);padding:10px 14px;margin:8px 0;font-size:0.9rem;color:var(--green);}
.eval-band {
  padding:10px 14px;margin-bottom:16px;font-size:0.8rem;
  border-left:3px solid var(--gold);background:rgba(201,168,76,0.08);
}
.eval-band.green {border-left-color:var(--green);background:rgba(74,158,74,0.08);}
.eval-band.red {border-left-color:var(--rust);background:rgba(212,84,26,0.08);}
@media(max-width:500px){.grid-2,.grid-4{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════
// MOMENT TROC · STUDIO — Version avec Auto-Évaluation
// ═══════════════════════════════════════

const MASTER_KEY = 'MKB2000-2022A';
const VALID_KEYS = ['MT-2024A','MT-2024B','MT-2024C','MT-2024D','MT-2024E','MT-2024F','MT-2024G','MT-2024H','MT-2024I','MT-2024J','MT-2024K','MT-2024L','MT-2024M','MT-2024N','MT-2024O','MT-2024P','MT-2024Q','MT-2024R','MT-2024S','MT-2024T'];
function getMomentKey(){return localStorage.getItem('mt_moment_key');}
function setMomentKey(k){localStorage.setItem('mt_moment_key',k);}
function getGeminiKey(){return localStorage.getItem('mt_gemini_key');}
function setGeminiKey(k){localStorage.setItem('mt_gemini_key',k);}

const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=';

async function callGemini(prompt, useSearch=false, maxTokens=1400){
  const key = getGeminiKey();
  if(!key) throw new Error('Clé Gemini manquante');
  const body = {
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.88,maxOutputTokens:maxTokens}
  };
  if(useSearch) body.tools = [{google_search:{}}];
  const res = await fetch(GEMINI_URL+key,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!res.ok){
    const e = await res.json().catch(()=>({}));
    if(res.status===429) throw new Error('Limite API atteinte. Reviens dans 1 minute.');
    throw new Error(e?.error?.message||'Erreur API');
  }
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
  return text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/#{1,6}\s/g,'').trim();
}

const state = {
  step:'unlock',
  biz:'',cible:'',probleme:'',matiere:'',
  dialogAnswers:[],
  profilData:null,
  mode:'désir',
  maitre:null,
  currentPost:null,
  evalData:null,
  arsenal:JSON.parse(localStorage.getItem('mt_arsenal')||'[]')
};

const PROFILS = {
  AUTOMATISEUR:{organe:'Cortex Préfrontal',desir:'Un rail clair sans options',peur:'Le chaos, la surcharge mentale'},
  OPTIMISEUR:{organe:'Striatum',desir:'Le meilleur retour sur investissement',peur:'Perdre du temps ou de l\'argent'},
  ÉLÉVATEUR:{organe:'Noyau Accumbens',desir:'La reconnaissance, le statut',peur:'Être exclu, dépassé'},
  LIBÉRATEUR:{organe:'Cortex Cingulaire',desir:'La singularité, la liberté',peur:'Être enfermé dans une case'}
};

const MAITRES = [
  {id:'scofield',nom:'Michael Scofield',categorie:'Architecte de l\'Ombre',ton:'Plan froid, imparable, chirurgical.',prompt:'Mode Scofield — Présente le contenu comme un plan étape par étape (1/, 2/, 3/). Chaque étape est froide et méthodique. La dernière étape révèle que le plan était un piège pour le lecteur. Chirurgical, imparable.'},
  {id:'moriarty',nom:'James Moriarty',categorie:'Architecte de l\'Ombre',ton:'Toujours trois coups d\'avance sur la pensée du lecteur.',prompt:'Mode Moriarty — Écris un post qui sait ce que le lecteur va penser avant qu\'il ne le pense. Anticipe ses objections, ses peurs, ses désirs. Chaque phrase est une pièce d\'échec. Le lecteur ne voit le piège qu\'à la fin.'},
  {id:'palpatine',nom:'Empereur Palpatine',categorie:'Architecte de l\'Ombre',ton:'Le faux mentor, le piège à long terme.',prompt:'Mode Palpatine — Posture de mentor bienveillant. Offre une solution simple à un problème complexe. Le lecteur se sent guidé, en sécurité. À la fin, une phrase glissée qui suggère un piège bien plus vaste.'},
  {id:'iago',nom:'Iago',categorie:'Architecte de l\'Ombre',ton:'Le poison des mots qui dégrade la certitude.',prompt:'Mode Iago — Insinue le doute chez le lecteur. Ne l\'attaque pas frontalement. Glisse des "et si" qui érodent. Le lecteur finit le post moins sûr de lui qu\'au début.'},
  {id:'itachi',nom:'Itachi Uchiha',categorie:'Briseur de Réalité',ton:'Projection noire puis réveil brutal.',prompt:'Mode Itachi — Projette le lecteur dans un futur négatif plausible s\'il ne change rien. Fais-lui vivre des détails sensoriels. Puis rupture: "Ouvre les yeux. Ceci n\'est pas encore réel." puis vérité froide.'},
  {id:'cobb',nom:'Dominick Cobb',categorie:'Briseur de Réalité',ton:'Plante une idée dans l\'esprit en faisant croire qu\'elle vient du lecteur.',prompt:'Mode Cobb — Le post doit faire croire au lecteur qu\'il a eu l\'idée par lui-même. Ne donne pas de conseil direct. Ils arrivent à la conclusion seuls. La dernière ligne referme la boucle.'},
  {id:'mrrobot',nom:'Mr. Robot',categorie:'Briseur de Réalité',ton:'La rupture du système, le bug dans la matrice.',prompt:'Mode Mr. Robot — Post anarchique. Brise les conventions du copywriting. Peut être agressif, décousu, mais lucide. Le lecteur sent que quelque chose ne va pas. La fin est un appel à tout casser.'},
  {id:'tyler',nom:'Tyler Durden',categorie:'Briseur de Réalité',ton:'Brûler le faux confort pour révéler la vérité nue.',prompt:'Mode Tyler Durden — Post frontal, brutal. Détruis les illusions que le lecteur chérit. Ne caresse pas, ne console pas. Révèle la vérité crue. Le lecteur doit se sentir secoué.'},
  {id:'will',nom:'Will Aime',categorie:'Miroir Vivant',ton:'Un "il" qui devient "tu". Fin sans résolution.',prompt:'Mode Will Aime — Commence par un "il" ou "elle" dans une scène du quotidien africain réel. Bascule vers "tu" à la fin sans transition forcée. Le lecteur réalise que c\'était lui. JAMAIS de morale explicite. Fin ouverte.'},
  {id:'tyrion',nom:'Tyrion Lannister',categorie:'Miroir Vivant',ton:'La faiblesse retournée en pouvoir suprême.',prompt:'Mode Tyrion — Commence par un aveu de faiblesse ou d\'exclusion. Retourne cette faiblesse en démonstration de force. Le lecteur qui se sent exclu doit se sentir puissant à la fin. Froid, intelligent.'},
  {id:'hannibal',nom:'Hannibal Lecter',categorie:'Miroir Vivant',ton:'L\'observation si fine qu\'elle en devient terrifiante.',prompt:'Mode Hannibal — Analyse le lecteur avec une précision chirurgicale et malaisante. Nomme ce qu\'il cache, ce qu\'il ne dit pas, ce qu\'il se dit seul la nuit. Le post est un miroir. Pas d\'émotion. Juste la vérité froide.'},
  {id:'joker',nom:'Le Joker',categorie:'Miroir Vivant',ton:'La provocation qui révèle la vraie nature.',prompt:'Mode Joker — Post provocateur qui force le lecteur à se révéler. Pousse-le à réagir, à se défendre. La fin retourne sa réaction contre lui. Ce n\'est pas toi qui es fou. C\'est lui qui se croit sain d\'esprit.'},
  {id:'bismarck',nom:'Otto von Bismarck',categorie:'Stratège Silencieux',ton:'La force tranquille, le pragmatisme froid.',prompt:'Mode Bismarck — Post sobre, pragmatique, sans émotion. Parle de faits, de conséquences, de pouvoir. Ne promets rien. Constates. Le lecteur doit sentir la force du silence.'},
  {id:'baelish',nom:'Petyr Baelish',categorie:'Stratège Silencieux',ton:'Tirer avantage de chaque événement, surtout les pires.',prompt:'Mode Baelish — Post cynique. Montre comment tirer profit du chaos, des échecs, des crises. Le lecteur apprend à voir l\'opportunité dans chaque désastre. Fin subtile, jamais explicite.'},
  {id:'frank',nom:'Frank Underwood',categorie:'Stratège Silencieux',ton:'La confession directe au lecteur, faire de lui un complice.',prompt:'Mode Frank — Post en confidence. Le lecteur est un complice. Parle-lui comme à un initié. Dévoile des coulisses, des stratégies. Fin avec un clin d\'œil. "Tu sais maintenant."'},
  {id:'v',nom:'V',categorie:'Stratège Silencieux',ton:'Faire exploser un système de croyances pour le reconstruire.',prompt:'Mode V — Post révolutionnaire. Attaque une croyance établie. La détruit méthodiquement. Puis propose une reconstruction. Le lecteur doit ressortir transformé.'}
];

const CATEGORIES = ['Architecte de l\'Ombre','Briseur de Réalité','Miroir Vivant','Stratège Silencieux'];

const app = document.getElementById('app');
function render(html){app.innerHTML=html;}
function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showErr(id,msg){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="err-box">⚠ ${esc(msg)}</div>`;}

// ═══════════════════════════════════════
// ÉTAPES (identiques à la version précédente)
// ═══════════════════════════════════════

function renderUnlock(){
  render(`
    <div class="center" style="margin-top:60px;">
      <div class="eyebrow">Moment Troc · Studio</div>
      <h1>Clé<br>d'Accès</h1>
      <p class="sub">Entre la clé fournie par Kabou Meshak.</p>
      <input id="key-input" type="text" placeholder="MT-2024X..." autocomplete="off" style="text-transform:uppercase;" />
      <div id="gate-err" style="min-height:20px;color:var(--rust);font-size:0.8rem;margin-top:8px;"></div>
      <button class="btn btn-main" onclick="validateMomentKey()">Entrer →</button>
    </div>
  `);
}

window.validateMomentKey = function(){
  const k = document.getElementById('key-input').value.trim().toUpperCase();
  const err = document.getElementById('gate-err');
  if(k===MASTER_KEY||VALID_KEYS.includes(k)){
    setMomentKey(k);
    state.step='gemini';
    renderGeminiGate();
  } else {err.textContent='Clé invalide.';}
};

function renderGeminiGate(){
  render(`
    <div class="center" style="margin-top:60px;">
      <div class="eyebrow">Étape 2/2</div>
      <h1>Clé API<br>Gemini</h1>
      <p class="sub">
        Obtiens-la gratuitement sur <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--rust);">aistudio.google.com</a><br>
        <small style="color:var(--ink-dim);">Stockée localement, jamais partagée.</small>
      </p>
      <input id="gemini-input" type="password" placeholder="AIza..." autocomplete="off" />
      <div id="gemini-err" style="min-height:20px;color:var(--rust);font-size:0.8rem;margin-top:8px;"></div>
      <button class="btn btn-main" onclick="validateGeminiKey()">Activer le moteur →</button>
    </div>
  `);
}

window.validateGeminiKey = async function(){
  const k = document.getElementById('gemini-input').value.trim();
  const err = document.getElementById('gemini-err');
  if(!k.startsWith('AIza')||k.length<30){err.textContent='Clé invalide.';return;}
  try{
    const test = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${k}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:'OK'}]}],generationConfig:{maxOutputTokens:3}})
    });
    if(!test.ok) throw new Error('Clé rejetée');
    setGeminiKey(k);
    state.step='brief';
    renderBrief();
  }catch(e){err.textContent='Clé rejetée par Gemini. Vérifie ton compte.';}
};

function renderBrief(){
  const saved = JSON.parse(localStorage.getItem('mt_brief')||'{}');
  if(saved.biz){state.biz=saved.biz;state.cible=saved.cible;state.probleme=saved.probleme;state.matiere=saved.matiere;}
  render(`
    <div class="eyebrow">Brief</div>
    <h1>Décharge<br><em>ton idée.</em></h1>
    <p class="sub">Décris ton business, ta cible, le problème. Même en vrac.</p>
    <textarea id="brief-input" rows="6" placeholder="Ex: Je vends une formation en ligne aux entrepreneurs africains qui n'arrivent pas à gérer leur trésorerie...">${esc(state.biz + (state.cible ? '\n' + state.cible : '') + (state.probleme ? '\n' + state.probleme : ''))}</textarea>
    <button class="btn btn-main" onclick="submitBrief()">Analyser mon marché →</button>
  `);
}

window.submitBrief = async function(){
  const raw = document.getElementById('brief-input').value.trim();
  if(!raw||raw.length<15){alert('Décris ton business un peu plus.');return;}
  state.biz = raw;
  localStorage.setItem('mt_brief',JSON.stringify({biz:raw,cible:state.cible,probleme:state.probleme,matiere:state.matiere}));
  state.step='dialogue';
  renderDialogue();
  try{
    const qPrompt = `Tu es l'agent Moment Troc. Business : "${raw}". Pose exactement 2 questions stratégiques pour affiner le brief.
    Choisis parmi : "Qu'est-ce que ton client se dit quand il n'arrive pas à dormir ?", "Qu'a-t-il déjà essayé ? Pourquoi ça n'a pas marché ?", "Qui est son plus grand concurrent ? Pourquoi es-tu meilleur ?".
    Retourne chaque question sur une ligne séparée, sans numéro.`;
    const qRaw = await callGemini(qPrompt, true, 400);
    const questions = qRaw.split('\n').filter(l=>l.trim().length>10).slice(0,2);
    document.getElementById('dialogue-questions').innerHTML = questions.map((q,i)=>`
      <div class="chat-bubble"><strong>Agent</strong> : ${esc(q)}</div>
      <textarea id="dial-answer-${i}" rows="2" placeholder="Ta réponse..."></textarea>
    `).join('');
    document.getElementById('dialogue-box').classList.remove('hidden');
  }catch(e){showErr('dialogue-err',e.message);}
};

function renderDialogue(){
  render(`
    <div class="eyebrow">Dialogue</div>
    <h1>L'agent<br><em>t'écoute.</em></h1>
    <div id="dialogue-questions"></div>
    <div id="dialogue-box" class="hidden">
      <button class="btn btn-main" onclick="submitDialogue()">Continuer →</button>
    </div>
    <div id="dialogue-err"></div>
  `);
}

window.submitDialogue = async function(){
  const answers = [];
  for(let i=0;i<2;i++){const el=document.getElementById('dial-answer-'+i);if(el)answers.push(el.value.trim());}
  state.dialogAnswers = answers;
  const saved = JSON.parse(localStorage.getItem('mt_brief')||'{}');
  saved.dialogue = answers;
  localStorage.setItem('mt_brief',JSON.stringify(saved));
  try{
    const detectPrompt = `Tu es un expert du framework Moment Troc.
    Business : "${state.biz}". Réponses aux questions : "${answers.join(' ')}".
    Retourne UNIQUEMENT ce JSON (rien d'autre) :
    {"profil":"AUTOMATISEUR","mode":"peur","organe":"Cortex Préfrontal","tension":"phrase intérieure","simple":"explication simple"}
    Profils possibles : AUTOMATISEUR, OPTIMISEUR, ÉLÉVATEUR, LIBÉRATEUR. Mode: désir ou peur.`;
    const raw = await callGemini(detectPrompt, false, 500);
    const match = raw.match(/\{[\s\S]*?\}/);
    if(!match) throw new Error('Profil non détecté');
    state.profilData = JSON.parse(match[0]);
    state.step='mode';
    renderMode();
  }catch(e){showErr('dialogue-err',e.message);}
};

function renderMode(){
  const p = state.profilData;
  const info = PROFILS[p.profil]||PROFILS.AUTOMATISEUR;
  render(`
    <div class="eyebrow">Profil détecté</div>
    <h1>${esc(p.profil)}<br><em>mode ${esc(p.mode)}</em></h1>
    <div class="card">
      <div class="tag">${esc(p.organe)}</div>
      <p style="margin-top:12px;font-style:italic;color:var(--ink-mid);">"${esc(p.tension)}"</p>
      <p style="color:var(--ink-dim);margin-top:8px;">${esc(p.simple)}</p>
    </div>
    <div class="grid-2">
      <div class="card ${state.mode==='désir'?'':'gold'}" style="cursor:pointer;" onclick="setMode('désir')">
        <div class="tag">🟢 Désir</div>
        <p style="margin-top:8px;color:var(--ink-mid);">Attiré par : ${esc(info.desir)}</p>
      </div>
      <div class="card ${state.mode==='peur'?'':'gold'}" style="cursor:pointer;" onclick="setMode('peur')">
        <div class="tag">🔴 Peur</div>
        <p style="margin-top:8px;color:var(--ink-mid);">Fuit : ${esc(info.peur)}</p>
      </div>
    </div>
    <button class="btn btn-main" onclick="goToPantheon()">Choisir le Maître →</button>
  `);
}

window.setMode = function(m){state.mode=m;renderMode();};
window.goToPantheon = function(){state.step='pantheon';renderPantheon();};

function renderPantheon(){
  let currentCat = '';
  let html = `
    <div class="eyebrow">Arsenal des Maîtres</div>
    <h1>Choisis<br><em>ton illusion.</em></h1>
    <p class="sub">16 esprits. Une infinité de voix.</p>
  `;
  html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
    <button class="btn btn-ghost" onclick="filterMaitres('Tous')" style="width:auto;padding:8px 14px;font-size:0.7rem;">Tous</button>
    ${CATEGORIES.map(c=>`<button class="btn btn-ghost" onclick="filterMaitres('${c}')" style="width:auto;padding:8px 14px;font-size:0.7rem;">${c}</button>`).join('')}
  </div>`;
  html += `<div class="grid-2" id="maitres-grid">
    ${MAITRES.map(m=>`
      <div class="maitre-card" id="maitre-${m.id}" data-cat="${m.categorie}" onclick="selectMaitre('${m.id}')">
        <div class="maitre-name">${m.nom}</div>
        <div class="maitre-type">${m.categorie}</div>
        <p style="font-size:0.7rem;color:var(--ink-dim);margin-top:6px;">${m.ton}</p>
      </div>
    `).join('')}
  </div>
  <button class="btn btn-main" id="btn-generate" onclick="generatePost()" disabled>Générer le post →</button>`;
  render(html);
}

window.filterMaitres = function(cat){
  document.querySelectorAll('.maitre-card').forEach(card=>{
    if(cat==='Tous'||card.getAttribute('data-cat')===cat){
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
};

window.selectMaitre = function(id){
  state.maitre = MAITRES.find(m=>m.id===id);
  document.querySelectorAll('.maitre-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('maitre-'+id).classList.add('selected');
  document.getElementById('btn-generate').disabled = false;
};

// ═══════════════════════════════════════
// GÉNÉRATION (AVEC AUTO-ÉVALUATION INTÉGRÉE)
// ═══════════════════════════════════════
window.generatePost = async function(){
  const m = state.maitre;
  const p = state.profilData;
  const info = PROFILS[p.profil];
  const modeDesc = state.mode==='peur'?info.peur:info.desir;
  render(`
    <div class="eyebrow">Génération</div>
    <h1>L'agent<br><em>travaille…</em></h1>
    <div class="card"><p style="color:var(--ink-dim);">Calibration ${esc(m.nom)} × ${esc(p.profil)} en cours…</p></div>
  `);
  try{
    const prompt = `Tu es un ghostwriter expert Moment Troc. Tu actives le Maître ${m.nom}.

PROFIL CIBLE :
- Archétype : ${p.profil}
- Organe : ${info.organe}
- Mode : ${state.mode} (${modeDesc})
- Tension intérieure : "${p.tension}"

BUSINESS : ${state.biz}

MÉCANIQUE DU MAÎTRE :
${m.prompt}

INTENTION : Miroir / Valeur
STRUCTURE : T1 (Expérience) → T2 (Rupture) → T3 (Mise en lumière + Permission). JAMAIS d'urgence.

RÈGLES :
- Commence directement par le contenu. Pas de titre.
- Respecte la longueur de 80-150 mots.
- Langage africain francophone naturel.
- JAMAIS "peace". JAMAIS de conclusion moralisatrice.

À LA FIN, après le post, ajoute une ligne "AUTOEVAL:" suivie de l'évaluation.
L'auto-évaluation doit être une phrase concise qui juge si le post active bien le ${info.organe} et respecte la mécanique ${m.nom}.
Exemples :
AUTOEVAL: [OK] Le post active précisément le ${info.organe} et respecte la mécanique ${m.nom}.
AUTOEVAL: [MOYEN] Le post active le ${info.organe} mais la mécanique ${m.nom} pourrait être plus marquée.
AUTOEVAL: [FAIBLE] Le post est trop générique, il manque la rupture propre à ${m.nom}.

Retourne le post PUIS la ligne AUTOEVAL.`;
    const text = await callGemini(prompt, false, 1400);
    // Parser l'auto-évaluation
    const evalMatch = text.match(/AUTOEVAL:\s*(.*)/i);
    let evalText = '';
    if(evalMatch){
      evalText = evalMatch[1].trim();
      state.currentPost = text.replace(/AUTOEVAL:.*/i,'').trim();
    } else {
      state.currentPost = text;
      evalText = 'Auto-évaluation non disponible.';
    }
    // Déterminer la couleur du bandeau
    let evalClass = '';
    if(evalText.startsWith('[OK]')) evalClass = 'green';
    else if(evalText.startsWith('[FAIBLE]')) evalClass = 'red';
    state.evalData = {text: evalText, cls: evalClass};
    state.step='result';
    renderResult();
  }catch(e){app.innerHTML+=`<div class="err-box">${esc(e.message)}</div>`;}
};

// ═══════════════════════════════════════
// RÉSULTAT (AVEC BANDEAU D'ÉVALUATION)
// ═══════════════════════════════════════
function renderResult(){
  const ev = state.evalData;
  render(`
    <div class="eyebrow">Post généré</div>
    <h1>Ton<br><em>missile.</em></h1>
    ${ev ? `
    <div class="eval-band ${ev.cls}">
      <strong>Auto-évaluation :</strong> ${esc(ev.text)}
    </div>` : ''}
    <div class="card" style="border-top-color:var(--gold);">
      <div class="card-header">
        <div>
          <span class="tag">${esc(state.profilData.profil)}</span>
          <span class="tag gold">${esc(state.maitre.nom)}</span>
        </div>
      </div>
      <div class="post-body">${esc(state.currentPost)}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="copyPost()">Copier</button>
        <button class="btn btn-ghost" onclick="recyclePost()">Recycler</button>
        <button class="btn btn-main" onclick="goBackToPantheon()">Nouveau Maître</button>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="resetAll()">← Nouveau brief</button>
  `);
}

window.copyPost = function(){navigator.clipboard.writeText(state.currentPost).then(()=>alert('Post copié !'));};
window.recyclePost = function(){
  state.matiere = state.currentPost;
  const saved = JSON.parse(localStorage.getItem('mt_brief')||'{}');
  saved.matiere = state.currentPost;
  localStorage.setItem('mt_brief',JSON.stringify(saved));
  state.step='pantheon';
  renderPantheon();
};
window.goBackToPantheon = function(){state.step='pantheon';renderPantheon();};
window.resetAll = function(){state.step='brief';renderBrief();};

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.onload = function(){
  const momentKey = getMomentKey();
  if(!momentKey||(momentKey!==MASTER_KEY&&!VALID_KEYS.includes(momentKey))){
    state.step='unlock';renderUnlock();
  } else if(!getGeminiKey()){
    state.step='gemini';renderGeminiGate();
  } else {
    state.step='brief';renderBrief();
  }
};
</script>
</body>
</html>
