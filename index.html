<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Moment Troc · Studio</title>
  <style>
    :root {
      --paper: #080808; --card: #0F0F0F; --card2: #141414;
      --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.18); --gold-line: rgba(201,168,76,0.35); --gold-glow: rgba(201,168,76,0.12);
      --ink: #F0EAD6; --ink-mid: rgba(240,234,214,0.60); --ink-dim: rgba(240,234,214,0.28); --ink-ghost: rgba(240,234,214,0.10);
      --line: rgba(201,168,76,0.10); --line-hard: rgba(201,168,76,0.22); --green: #4a9e6a; --red: #9e4a4a;
      --font-display: 'Georgia', serif; --font-body: 'Georgia', serif; --font-mono: 'Courier New', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--paper); color:var(--ink); font-family:var(--font-body); font-size:1.05rem; line-height:1.7; min-height:100vh; padding:28px 18px 120px; max-width:720px; margin:0 auto; }
    .hidden { display:none!important; }
    h1 { font-family:var(--font-display); font-size:clamp(2.4rem,8vw,3.2rem); font-weight:700; line-height:0.95; text-transform:uppercase; color:var(--ink); }
    h1 em { font-family:'Georgia',serif; font-style:italic; font-weight:700; color:var(--gold); text-transform:none; font-size:0.85em; display:block; }
    .eyebrow { font-family:var(--font-mono); font-size:0.65rem; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
    .sub { color:var(--ink-mid); font-size:1rem; margin:14px 0 24px; font-style:italic; }
    textarea, input[type="text"], input[type="password"] { width:100%; background:var(--card2); border:1px solid var(--line); border-left:2px solid var(--gold-line); color:var(--ink); padding:16px 18px; font-family:'Georgia',serif; font-size:1rem; line-height:1.7; resize:vertical; outline:none; border-radius:2px; }
    textarea:focus, input:focus { border-left-color:var(--gold); }
    textarea::placeholder, input::placeholder { color:var(--ink-dim); font-style:italic; }
    .btn { display:block; width:100%; padding:16px 20px; border:none; font-family:'Courier New',monospace; font-size:0.72rem; letter-spacing:3px; text-transform:uppercase; cursor:pointer; margin-top:12px; border-radius:2px; transition:all 0.2s ease; }
    .btn-main { background:transparent; color:var(--gold); border:1px solid var(--gold-line); border-left:3px solid var(--gold); }
    .btn-main:hover { background:var(--gold-dim); border-color:var(--gold); }
    .btn-ghost { background:transparent; border:1px solid var(--line-hard); color:var(--ink-dim); }
    .btn-ghost:hover { border-color:var(--gold-line); color:var(--ink); }
    .btn:disabled { opacity:0.25; cursor:not-allowed; }
    .card { background:var(--card); border:1px solid var(--line); border-top:2px solid var(--gold-line); padding:22px 20px; margin-bottom:18px; border-radius:2px; position:relative; overflow:hidden; }
    .card::before { content:''; position:absolute; top:0; left:0; width:40px; height:2px; background:var(--gold); }
    .card.gold { border-top-color:var(--gold); }
    .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .tag { display:inline-block; font-family:'Courier New',monospace; font-size:0.62rem; letter-spacing:2px; padding:4px 10px; text-transform:uppercase; border-radius:2px; margin-right:6px; }
    .tag.gold { background:var(--gold-dim); color:var(--gold); border:1px solid var(--gold-line); }
    .tag.line { background:transparent; border:1px solid var(--line-hard); color:var(--ink-dim); }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .maitre-card { background:var(--card2); border:1px solid var(--line); border-top:2px solid var(--ink-ghost); padding:16px; cursor:pointer; text-align:center; border-radius:2px; transition:all 0.2s ease; }
    .maitre-card:hover { border-top-color:var(--gold-line); }
    .maitre-card.selected { background:var(--gold-dim); border-color:var(--gold-line); border-top-color:var(--gold); }
    .maitre-name { font-family:'Georgia',serif; font-size:0.9rem; font-weight:600; margin-bottom:4px; color:var(--ink); }
    .maitre-type { font-family:'Courier New',monospace; font-size:0.6rem; color:var(--gold); letter-spacing:2px; text-transform:uppercase; }
    .chat-bubble { background:var(--card2); border:1px solid var(--line); border-left:2px solid var(--gold-line); padding:14px 18px; margin-bottom:10px; border-radius:2px; font-family:'Georgia',serif; font-size:0.95rem; color:var(--ink-mid); }
    .chat-bubble strong { color:var(--gold); font-family:'Courier New',monospace; font-size:0.65rem; letter-spacing:3px; text-transform:uppercase; display:block; margin-bottom:6px; }
    .post-body { font-family:'Georgia',serif; font-size:1.15rem; line-height:2; white-space:pre-wrap; color:var(--ink); padding:28px 0; }
    .strat-block { background:var(--gold-glow); border-left:2px solid var(--gold); padding:14px 18px; margin-bottom:20px; font-family:'Courier New',monospace; font-size:0.78rem; line-height:1.65; color:var(--ink-mid); border-radius:0 2px 2px 0; }
    .err-box { background:rgba(158,74,74,0.08); border-left:2px solid var(--red); padding:12px 16px; margin:12px 0; font-family:'Courier New',monospace; font-size:0.8rem; color:var(--red); border-radius:0 2px 2px 0; }
    .ok-box { background:rgba(74,158,106,0.08); border-left:2px solid var(--green); padding:10px 14px; margin:8px 0; font-family:'Courier New',monospace; font-size:0.8rem; color:var(--green); border-radius:0 2px 2px 0; }
    .eval-band { padding:10px 14px; margin-bottom:14px; font-family:'Courier New',monospace; font-size:0.75rem; border-left:2px solid var(--gold); background:var(--gold-glow); border-radius:0 2px 2px 0; }
    .eval-band.green { border-left-color:var(--green); background:rgba(74,158,106,0.06); color:var(--green); }
    .eval-band.red { border-left-color:var(--red); background:rgba(158,74,74,0.06); color:var(--red); }
    .loading-bar { width:100%; height:2px; background:var(--line); margin-top:16px; border-radius:2px; overflow:hidden; }
    .loading-bar-fill { width:0%; height:100%; background:var(--gold); border-radius:2px; animation:loadBar 2.2s ease infinite; }
    @keyframes loadBar { 0%{width:0%;} 50%{width:80%;} 100%{width:0%;} }
    .cal-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-top:16px; }
    .cal-cell { aspect-ratio:1; background:var(--card2); border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s ease; position:relative; border-radius:2px; font-family:'Courier New',monospace; }
    .cal-cell .day-num { font-family:'Courier New',monospace; font-size:1rem; color:var(--ink-dim); }
    .cal-cell .day-ep { font-family:'Courier New',monospace; font-size:0.55rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-top:3px; }
    .cal-cell.rest { opacity:0.22; cursor:default; pointer-events:none; }
    .cal-cell.has { background:var(--card); border:1px solid var(--gold-line); border-top:2px solid var(--gold); cursor:pointer; }
    .cal-cell.has .day-num { color:var(--ink); font-weight:500; }
    .cal-cell.has:hover { background:var(--gold-dim); border-color:var(--gold); }
    .cal-cell.has::before { content:attr(data-profil); position:absolute; top:4px; right:5px; font-family:'Courier New',monospace; font-size:0.42rem; letter-spacing:1px; text-transform:uppercase; color:var(--gold); }
    .cal-cell.placeholder { cursor:pointer; border-top:2px solid var(--ink-ghost); }
    .cal-cell.placeholder:hover { border-top-color:var(--gold-line); background:var(--card); }
    .cal-cell.placeholder .day-num { color:var(--ink-dim); }
    .day-detail { background:var(--card); border:1px solid var(--line); border-top:2px solid var(--gold); padding:22px 20px; margin-top:16px; border-radius:2px; position:relative; }
    .day-detail::before { content:''; position:absolute; top:0; left:0; width:60px; height:2px; background:var(--gold); }
    .day-detail .post-preview { font-family:'Georgia',serif; font-size:1rem; line-height:1.85; color:var(--ink-mid); white-space:pre-wrap; margin:14px 0; border-left:1px solid var(--gold-line); padding-left:16px; font-style:italic; }
    .day-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .day-actions .btn { flex:1; min-width:120px; margin-top:0; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(8,8,8,0.96); border-top:1px solid var(--line-hard); display:flex; justify-content:space-around; padding:6px 0 8px; z-index:1000; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 14px; transition:all 0.2s ease; font-family:'Courier New',monospace; font-size:0.58rem; letter-spacing:1.5px; color:var(--ink-dim); text-transform:uppercase; border:none; background:none; position:relative; }
    .nav-item::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:1px; background:var(--gold); transition:width 0.2s ease; }
    .nav-item.active { color:var(--gold); }
    .nav-item.active::after { width:24px; }
    .nav-icon { font-size:1.1rem; }
    .nav-item.active .nav-icon { opacity:1; }
    .nav-item:hover { color:var(--ink); }
    a { color:var(--gold); text-decoration:none; border-bottom:1px solid var(--gold-dim); }
    a:hover { border-bottom-color:var(--gold); }
    @media(max-width:500px){ .grid-2,.grid-4{ grid-template-columns:1fr; } h1{ font-size:2rem; } }
  </style>
</head>
<body>
<div id="app"></div>
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchMode('studio')"><span class="nav-icon">🎯</span>Studio</button>
  <button class="nav-item" onclick="switchMode('deconstruction')"><span class="nav-icon">🔬</span>Déconstruire</button>
  <button class="nav-item" onclick="switchMode('trockit')"><span class="nav-icon">💎</span>Troc Kit</button>
  <button class="nav-item" onclick="switchMode('arsenal')"><span class="nav-icon">📅</span>Arsenal</button>
</nav>
<script>
// ═══════════════════════════════════════════
// MOMENT TROC · STUDIO — Code Final (Timeouts Africains)
// ═══════════════════════════════════════════

// ─── Clés ───
const MASTER_KEY = 'MKB2000-2022A';
const VALID_KEYS = ['MT-2024A','MT-2024B','MT-2024C','MT-2024D','MT-2024E','MT-2024F','MT-2024G','MT-2024H','MT-2024I','MT-2024J','MT-2024K','MT-2024L','MT-2024M','MT-2024N','MT-2024O','MT-2024P','MT-2024Q','MT-2024R','MT-2024S','MT-2024T'];
function getMomentKey(){ return localStorage.getItem('mt_moment_key'); }
function setMomentKey(k){ localStorage.setItem('mt_moment_key', k); }
function getGeminiKey(){ return localStorage.getItem('mt_gemini_key'); }
function setGeminiKey(k){ localStorage.setItem('mt_gemini_key', k); }

// ─── API Gemini ─── (Timeouts augmentés pour l'Afrique)
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=';
async function callGemini(prompt, useSearch=false, maxTokens=1400, fastMode=false){
  const key = getGeminiKey();
  if(!key) throw new Error('Clé Gemini manquante');
  const body = { contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.88, maxOutputTokens:fastMode?400:maxTokens} };
  if(useSearch) body.tools = [{google_search:{}}];
  const controller = new AbortController();
  // ⚡ Timeout corrigé : 30s rapide, 60s long (adapté à la latence en Afrique)
  const timeout = setTimeout(() => controller.abort(), fastMode?30000:60000);
  const res = await fetch(GEMINI_URL+key, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body), signal: controller.signal });
  clearTimeout(timeout);
  if(!res.ok){ const e = await res.json().catch(()=>({})); if(res.status===429) throw new Error('Limite API atteinte. Reviens dans 1 minute.'); throw new Error(e?.error?.message||'Erreur API'); }
  const data = await res.json(); const text = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
  return text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/#{1,6}\s/g,'').trim();
}

// ─── Helpers ───
const app = document.getElementById('app');
function render(html){ app.innerHTML = html; }
function esc(s){ return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyTxt(text, btn){ navigator.clipboard.writeText(text).then(()=>{ btn.textContent='✓ Copié'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='Copier'; btn.classList.remove('copied'); },2000); }); }

// ─── Profils ───
const PROFILS = {
  AUTOMATISEUR: { organe:'Cortex Préfrontal', desir:'Un rail clair sans options', peur:'Le chaos, la surcharge mentale' },
  OPTIMISEUR_VALEUR: { organe:'Striatum', desir:'Le meilleur retour sur investissement', peur:'Le mauvais investissement' },
  OPTIMISEUR_PRIX: { organe:'Insula', desir:'Le juste prix', peur:'L\'arnaque, la douleur du prix' },
  ÉLÉVATEUR: { organe:'Noyau Accumbens', desir:'Le statut, l\'image', peur:'L\'exclusion, la honte sociale' },
  LIBÉRATEUR: { organe:'Cortex Cingulaire', desir:'La singularité, la liberté', peur:'Les cases, le générique' }
};

// ─── Maîtres ───
const MAITRES = [
  {id:'bismarck',nom:'Otto von Bismarck',categorie:'Stratège Silencieux',ton:'La force tranquille, le pragmatisme froid.'},
  {id:'will',nom:'Will Aime',categorie:'Miroir Vivant',ton:'Un "il" qui devient "tu". Fin sans résolution.'},
  {id:'itachi',nom:'Itachi Uchiha',categorie:'Briseur de Réalité',ton:'Projection noire puis réveil brutal.'},
  {id:'scofield',nom:'Michael Scofield',categorie:'Architecte de l\'Ombre',ton:'Plan froid, imparable, chirurgical.'},
  {id:'tyrion',nom:'Tyrion Lannister',categorie:'Miroir Vivant',ton:'La faiblesse retournée en pouvoir suprême.'},
  {id:'hannibal',nom:'Hannibal Lecter',categorie:'Miroir Vivant',ton:'L\'observation si fine qu\'elle en devient terrifiante.'},
  {id:'joker',nom:'Le Joker',categorie:'Miroir Vivant',ton:'La provocation qui révèle la vraie nature.'},
  {id:'moriarty',nom:'James Moriarty',categorie:'Architecte de l\'Ombre',ton:'Toujours trois coups d\'avance sur la pensée du lecteur.'},
  {id:'palpatine',nom:'Empereur Palpatine',categorie:'Architecte de l\'Ombre',ton:'Le faux mentor, le piège à long terme.'},
  {id:'iago',nom:'Iago',categorie:'Architecte de l\'Ombre',ton:'Le poison des mots qui dégrade la certitude.'},
  {id:'cobb',nom:'Dominick Cobb',categorie:'Briseur de Réalité',ton:'Plante une idée dans l\'esprit en faisant croire qu\'elle vient du lecteur.'},
  {id:'mrrobot',nom:'Mr. Robot',categorie:'Briseur de Réalité',ton:'La rupture du système, le bug dans la matrice.'},
  {id:'tyler',nom:'Tyler Durden',categorie:'Briseur de Réalité',ton:'Brûler le faux confort pour révéler la vérité nue.'},
  {id:'baelish',nom:'Petyr Baelish',categorie:'Stratège Silencieux',ton:'Tirer avantage de chaque événement, surtout les pires.'},
  {id:'frank',nom:'Frank Underwood',categorie:'Stratège Silencieux',ton:'La confession directe au lecteur, faire de lui un complice.'},
  {id:'v',nom:'V',categorie:'Stratège Silencieux',ton:'Faire exploser un système de croyances pour le reconstruire.'}
];
const CATEGORIES = ['Architecte de l\'Ombre','Briseur de Réalité','Miroir Vivant','Stratège Silencieux'];

// ─── États globaux ───
const state = {
  step:'unlock', mode:'studio', biz:'', dialogueAnswers:[], profilData:null, profilMode:'désir',
  atelier:null, format:null, maitre:null, currentPost:null, evalData:null, stratData:null,
  arsenalPosts: JSON.parse(localStorage.getItem('mt_arsenal_posts')||'{}'),
  verite:'', angles:[], sousAngles:[], currentGraineId:null, expertiseAnswers:[], generationMode:'unitaire',
  arsenalFractal: JSON.parse(localStorage.getItem('mt_arsenal_fractal')||'[]')
};
const dcState = { step:'input', post:'', contexte:'', analyse:null, contreAngle:null };
const tkState = { offre:'', profil:'AUTOMATISEUR', mode:'désir', scripts:null };

// ─── Navigation ───
window.switchMode = function(m) {
  state.mode = m;
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', ['studio','deconstruction','trockit','arsenal'][i] === m);
  });
  if (m === 'studio') renderStudioMode();
  else if (m === 'deconstruction') renderDeconstruction();
  else if (m === 'trockit') renderTrocKit();
  else if (m === 'arsenal') renderArsenalFractal();
};

/* ═══════════════════════════════════════ STUDIO ═══════════════════════════════════════ */
function renderStudioMode() {
  if (state.step === 'unlock') renderUnlock();
  else if (state.step === 'gemini') renderGeminiGate();
  else if (state.step === 'brief') renderBrief();
  else if (state.step === 'dialogue') renderDialogue();
  else if (state.step === 'profil') renderProfil();
  else if (state.step === 'atelier') renderAtelier();
  else if (state.step === 'format') renderFormat();
  else if (state.step === 'pantheon') renderPantheon();
  else if (state.step === 'result') renderResult();
}

function renderUnlock(){
  render(`<div class="center" style="margin-top:60px;"><div class="eyebrow">Moment Troc · Studio</div><h1>Clé d'Accès</h1><p class="sub">Entre la clé fournie.</p><input id="key-input" type="text" placeholder="MT-2024X..." autocomplete="off" style="text-transform:uppercase;" /><div id="gate-err" style="min-height:20px;color:var(--red);font-size:0.8rem;margin-top:8px;"></div><button class="btn btn-main" onclick="validateMomentKey()">Entrer →</button></div>`);
}
window.validateMomentKey = function(){
  const k = document.getElementById('key-input').value.trim().toUpperCase();
  const err = document.getElementById('gate-err');
  if(k===MASTER_KEY||VALID_KEYS.includes(k)){ setMomentKey(k); state.step='gemini'; renderGeminiGate(); }
  else { err.textContent = 'Clé invalide.'; }
};

function renderGeminiGate(){
  render(`<div class="center" style="margin-top:60px;"><div class="eyebrow">Étape 2/2</div><h1>Clé API Gemini</h1><p class="sub">Gratuit sur <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></p><input id="gemini-input" type="password" placeholder="AIza..." autocomplete="off" /><div id="gemini-err" style="min-height:20px;color:var(--red);font-size:0.8rem;margin-top:8px;"></div><button class="btn btn-main" onclick="validateGeminiKey()">Activer le moteur →</button></div>`);
}
window.validateGeminiKey = async function(){
  const k = document.getElementById('gemini-input').value.trim();
  const err = document.getElementById('gemini-err');
  if(!k.startsWith('AIza')||k.length<30){ err.textContent='Clé invalide.'; return; }
  try{
    const test = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${k}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:'OK'}]}],generationConfig:{maxOutputTokens:3}})
    });
    if(!test.ok) throw new Error('Clé rejetée');
    setGeminiKey(k); state.step='brief'; renderBrief();
  }catch(e){ err.textContent = 'Clé rejetée par Gemini. Vérifie ton compte.'; }
};

function renderBrief(){
  const saved = JSON.parse(localStorage.getItem('mt_brief')||'{}');
  if(saved.biz){ state.biz = saved.biz; }
  render(`<div class="eyebrow">Brief</div><h1>Décharge ton idée</h1><p class="sub">Décris ton business, ta cible, le problème. Même en vrac.</p><textarea id="brief-input" rows="6" placeholder="Ex: Je vends une formation en ligne aux entrepreneurs africains qui n'arrivent pas à gérer leur trésorerie...">${esc(state.biz)}</textarea><button class="btn btn-main" onclick="submitBrief()">Analyser mon marché →</button>`);
}
window.submitBrief = async function(){
  const raw = document.getElementById('brief-input').value.trim();
  if(!raw||raw.length<15){ alert('Décris ton business un peu plus.'); return; }
  state.biz = raw; localStorage.setItem('mt_brief',JSON.stringify({biz:raw})); state.step='dialogue'; renderDialogue();
  try{
    const qPrompt = `Tu es l'agent Moment Troc. Business : "${raw}". Pose exactement 2 questions stratégiques pour affiner le brief. Choisis parmi : "Qu'est-ce que ton client se dit quand il n'arrive pas à dormir ?", "Qu'a-t-il déjà essayé ? Pourquoi ça n'a pas marché ?", "Qui est son plus grand concurrent ? Pourquoi es-tu meilleur ?". Retourne chaque question sur une ligne séparée, sans numéro.`;
    const qRaw = await callGemini(qPrompt, true, 400, true);
    const questions = qRaw.split('\n').filter(l=>l.trim().length>10).slice(0,2);
    document.getElementById('dialogue-questions').innerHTML = questions.map((q,i)=>`<div class="chat-bubble"><strong>Agent</strong> : ${esc(q)}</div><textarea id="dial-answer-${i}" rows="2" placeholder="Ta réponse..."></textarea>`).join('');
    document.getElementById('dialogue-box').classList.remove('hidden');
  }catch(e){ document.getElementById('dialogue-err').innerHTML = `<div class="err-box">⚠ ${esc(e.message)}</div>`; }
};
function renderDialogue(){
  render(`<div class="eyebrow">Dialogue</div><h1>L'agent t'écoute</h1><div id="dialogue-questions"></div><div id="dialogue-box" class="hidden"><button class="btn btn-main" onclick="submitDialogue()">Continuer →</button></div><div id="dialogue-err"></div>`);
}
window.submitDialogue = async function(){
  const answers = []; for(let i=0;i<2;i++){ const el=document.getElementById('dial-answer-'+i); if(el)answers.push(el.value.trim()); }
  state.dialogueAnswers = answers;
  try{
    const detectPrompt = `Tu es un expert du framework Moment Troc. Business : "${state.biz}". Réponses aux questions : "${answers.join(' ')}". Retourne UNIQUEMENT ce JSON (rien d'autre) : {"profil":"AUTOMATISEUR","mode":"peur","organe":"Cortex Préfrontal","tension":"phrase intérieure","simple":"explication simple"}. Profils possibles : AUTOMATISEUR, OPTIMISEUR_VALEUR, OPTIMISEUR_PRIX, ÉLÉVATEUR, LIBÉRATEUR. Mode: désir ou peur.`;
    const raw = await callGemini(detectPrompt, false, 500, true);
    const match = raw.match(/\{[\s\S]*?\}/); if(!match) throw new Error('Profil non détecté');
    state.profilData = JSON.parse(match[0]); state.step='profil'; renderProfil();
  }catch(e){ document.getElementById('dialogue-err').innerHTML = `<div class="err-box">⚠ ${esc(e.message)}</div>`; }
};

function renderProfil(){
  const p = state.profilData; const info = PROFILS[p.profil]||PROFILS.AUTOMATISEUR;
  render(`<div class="eyebrow">Profil détecté</div><h1>${esc(p.profil)} <em>mode ${esc(p.mode)}</em></h1>
    <div class="card"><div class="tag gold">${esc(p.organe)}</div><p style="margin-top:12px;font-style:italic;color:var(--ink-mid);">"${esc(p.tension)}"</p><p style="color:var(--ink-dim);margin-top:8px;">${esc(p.simple)}</p></div>
    <div class="grid-2">
      <div class="card ${state.profilMode==='désir'?'':'gold'}" style="cursor:pointer;" onclick="state.profilMode='désir';renderProfil();"><div class="tag gold">🟢 Désir</div><p style="margin-top:8px;color:var(--ink-mid);">Attiré par : ${esc(info.desir)}</p></div>
      <div class="card ${state.profilMode==='peur'?'':'gold'}" style="cursor:pointer;" onclick="state.profilMode='peur';renderProfil();"><div class="tag gold">🔴 Peur</div><p style="margin-top:8px;color:var(--ink-mid);">Fuit : ${esc(info.peur)}</p></div>
    </div>
    <button class="btn btn-main" onclick="state.step='atelier';renderAtelier();">Choisir l'Atelier →</button>`);
}

function renderAtelier(){
  render(`<div class="eyebrow">Atelier</div><h1>Choisis ta phase</h1>
    <div class="grid-2">
      <div class="card" style="cursor:pointer;" onclick="selectAtelier(1)"><div class="tag gold">1</div><h3 style="margin-top:8px;">Le Miroir</h3><p style="color:var(--ink-dim);">Implanter l'expertise. Nommer la douleur. Pas de vente.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectAtelier(2)"><div class="tag gold">2</div><h3 style="margin-top:8px;">La Forge</h3><p style="color:var(--ink-dim);">Intensifier la douleur. Se positionner comme la réponse.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectAtelier(3)"><div class="tag gold">3</div><h3 style="margin-top:8px;">Le Closing</h3><p style="color:var(--ink-dim);">Vendre. Post calibré + Troc Kit.</p></div>
    </div>
    <button class="btn btn-main" id="btn-atelier-next" onclick="state.step='format';renderFormat();" disabled>Continuer →</button>`);
}
window.selectAtelier = function(id){ state.atelier=id; document.getElementById('btn-atelier-next').disabled=false; };

function renderFormat(){
  render(`<div class="eyebrow">Format</div><h1>Choisis ta forme</h1>
    <div class="grid-2" id="format-grid">
      <div class="card" style="cursor:pointer;" onclick="selectFormat('tweet')"><div class="tag gold">Tweet</div><p style="color:var(--ink-dim);">60-90 mots. Une vérité. Pas de suite.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectFormat('thread')"><div class="tag gold">Thread</div><p style="color:var(--ink-dim);">Post + 4-5 commentaires. Suite en com.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectFormat('courtmetrage')"><div class="tag gold">Court Métrage</div><p style="color:var(--ink-dim);">150-200 mots. Scène Wil Aime.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectFormat('plan')"><div class="tag gold">Plan</div><p style="color:var(--ink-dim);">100-130 mots. Étapes. Dernière ligne = piège.</p></div>
    </div>
    <button class="btn btn-main" id="btn-format-next" onclick="state.step='pantheon';renderPantheon();" disabled>Continuer →</button>`);
}
window.selectFormat = function(id){ state.format=id; document.getElementById('btn-format-next').disabled=false; };

function renderPantheon(){
  render(`<div class="eyebrow">Arsenal des Maîtres</div><h1>Choisis ton illusion</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
      <button class="btn btn-ghost" onclick="filterMaitres('Tous')" style="width:auto;padding:8px 14px;font-size:0.7rem;">Tous</button>
      ${CATEGORIES.map(c=>`<button class="btn btn-ghost" onclick="filterMaitres('${c}')" style="width:auto;padding:8px 14px;font-size:0.7rem;">${c}</button>`).join('')}
    </div>
    <div class="grid-2" id="maitres-grid">
      ${MAITRES.map(m=>`<div class="maitre-card" id="maitre-${m.id}" data-cat="${m.categorie}" onclick="selectMaitre('${m.id}')"><div class="maitre-name">${m.nom}</div><div class="maitre-type">${m.categorie}</div><p style="font-size:0.7rem;color:var(--ink-dim);margin-top:6px;">${m.ton}</p></div>`).join('')}
    </div>
    <button class="btn btn-main" id="btn-generate" onclick="generatePost()" disabled>Générer le post →</button>`);
}
window.filterMaitres = function(cat){
  document.querySelectorAll('.maitre-card').forEach(card=>{ card.classList.toggle('hidden', cat!=='Tous' && card.getAttribute('data-cat')!==cat); });
};
window.selectMaitre = function(id){
  state.maitre = MAITRES.find(m=>m.id===id);
  document.querySelectorAll('.maitre-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('maitre-'+id).classList.add('selected');
  document.getElementById('btn-generate').disabled=false;
};

// Génération
window.generatePost = async function(){
  const p = state.profilData; const info = PROFILS[p.profil]; const m = state.maitre;
  const modeDesc = state.profilMode==='peur'?info.peur:info.desir;
  const atelierDesc = state.atelier===1?'Implanter. Pas de vente.':state.atelier===2?'Intensifier la douleur.':'Vendre.';
  const expertise = document.getElementById('expertise-input')?.value.trim() || state.expertiseAnswers.join(' | ');
  render(`<div class="eyebrow">Génération</div><h1>L'agent travaille…</h1><div class="card"><p style="color:var(--ink-dim);">Calibration ${esc(m.nom)} × ${esc(p.profil)} en cours…</p><div class="loading-bar"><div class="loading-bar-fill"></div></div></div>`);
  try{
    const prompt = `Tu es un ghostwriter expert Moment Troc. Tu actives le Maître ${m.nom}.
PROFIL CIBLE : ${p.profil}. Organe : ${info.organe}. Mode : ${state.profilMode} (${modeDesc}). Tension : "${p.tension}".
BUSINESS : ${state.biz}. ATELIER : ${atelierDesc}. FORMAT : ${state.format}.
${expertise ? `\nEXPERTISE ET VÉCU DE L'UTILISATEUR (source obligatoire pour le T1 et la suture. Utilise ses mots exacts.) : "${expertise}"` : ''}
STRUCTURE OBLIGATOIRE : Hook → T1 (Expérience) → T2 (Rupture) → Suture (1 phrase max, viscérale) → T3 (Mise en lumière) → T4 (Permission douce, jamais "Tape X"). JAMAIS signature. JAMAIS "peace".`;
    const text = await callGemini(prompt, false, 1400);
    state.currentPost = text; state.step='result'; renderResult();
  }catch(e){ app.innerHTML+=`<div class="err-box">${esc(e.message)}</div>`; }
};

function renderResult(){
  render(`<div class="eyebrow">Post généré</div><h1>Ton missile</h1>
    <div class="card" style="border-top-color:var(--gold);">
      <div class="card-header"><div><span class="tag gold">${esc(state.profilData.profil)}</span><span class="tag gold">Atelier ${state.atelier}</span></div></div>
      <div class="post-body">${esc(state.currentPost)}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(state.currentPost)},this)">Copier</button>
        <button class="btn btn-ghost" onclick="state.step='pantheon';renderPantheon();">Nouveau Maître</button>
        <button class="btn btn-main" id="btn-save-arsenal" onclick="saveToArsenal()">Sauvegarder dans l'Arsenal</button>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="state.step='brief';renderBrief();">← Nouveau brief</button>`);
}

/* ═══════════════════════════════════════ DÉCONSTRUCTION ═══════════════════════════ */
function renderDeconstruction() {
  render(`<div class="eyebrow">Mode Déconstruction</div><h1>L'agent dissèque</h1><p class="sub">Colle un post. L'agent révèle la mécanique cachée, les angles morts, et génère un contre-angle calibré.</p>
    <div class="field"><textarea id="dc-post" rows="8" maxlength="2000" placeholder="Colle ici le post complet à analyser..."></textarea></div>
    <div class="field"><textarea id="dc-contexte" rows="2" maxlength="300" placeholder="Qui a écrit ce post ? Dans quel secteur ?"></textarea></div>
    <div class="field"><div class="flabel">Sous-angle d'analyse</div>
      <div class="sgrid">
        <div class="sitem on" data-dcmode="profil" onclick="document.querySelectorAll('[data-dcmode]').forEach(e=>e.classList.remove('on')); this.classList.add('on');"><div class="sname">Angle Profil</div><div class="sdesc">Diagnostic pur. Quel organe est activé.</div></div>
        <div class="sitem" data-dcmode="marche" onclick="document.querySelectorAll('[data-dcmode]').forEach(e=>e.classList.remove('on')); this.classList.add('on');"><div class="sname">Angle Marché</div><div class="sdesc">Scan stratégique.</div></div>
        <div class="sitem" data-dcmode="atelier" onclick="document.querySelectorAll('[data-dcmode]').forEach(e=>e.classList.remove('on')); this.classList.add('on');"><div class="sname">Angle Atelier</div><div class="sdesc">Recyclage.</div></div>
      </div>
    </div>
    <button class="btn btn-main" onclick="runDeconstruction()">Lancer l'autopsie →</button>
    <div id="dc-prog" style="display:none;" class="prog-wrap"><div class="prog-title">Dissection en cours...</div><div class="loading-bar"><div class="loading-bar-fill"></div></div></div>
    <div id="dc-error" style="display:none;"></div>
    <div id="dc-result" style="display:none;"></div>`);
}

window.runDeconstruction = async function() {
  const post = document.getElementById('dc-post').value.trim();
  const contexte = document.getElementById('dc-contexte').value.trim();
  const mode = document.querySelector('[data-dcmode].on')?.getAttribute('data-dcmode') || 'profil';
  if (!post || post.length < 30) { document.getElementById('dc-error').style.display=''; document.getElementById('dc-error').innerHTML='<div class="err-box">⚠ Le post doit faire au moins 30 caractères.</div>'; return; }
  document.getElementById('dc-prog').style.display=''; document.getElementById('dc-error').style.display='none'; document.getElementById('dc-result').style.display='none';
  try {
    const raw = await callGemini(post.slice(0,1500), mode==='marche', 900);
    const contreAngle = await callGemini(`Crée un contre-angle pour ce post : "${post.slice(0,800)}". T1-T2-Suture-T3-T4.`, false, 800);
    document.getElementById('dc-prog').style.display='none'; document.getElementById('dc-result').style.display='';
    document.getElementById('dc-result').innerHTML = `
      <div class="dc-block" style="margin-top:24px;"><div class="s-eye">Rapport d'Autopsie</div><div style="font-size:11px;color:var(--ink-mid);line-height:1.9;white-space:pre-wrap;">${esc(raw)}</div></div>
      <div class="dc-block" style="border-top-color:var(--gold);"><div class="s-eye">Contre-Angle</div><div class="post-body">${esc(contreAngle)}</div><button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(contreAngle)},this)">Copier</button></div>
      <button class="btn btn-ghost" onclick="renderDeconstruction()">← Nouvelle autopsie</button>`;
  } catch(e) { document.getElementById('dc-prog').style.display='none'; document.getElementById('dc-error').style.display=''; document.getElementById('dc-error').innerHTML = `<div class="err-box">⚠ ${esc(e.message)}</div>`; }
};

/* ═══════════════════════════════════════ TROC KIT ═══════════════════════════ */
function renderTrocKit() {
  const profils = ['AUTOMATISEUR','OPTIMISEUR_VALEUR','OPTIMISEUR_PRIX','ÉLÉVATEUR','LIBÉRATEUR'];
  render(`<div class="eyebrow">Troc Kit</div><h1>Le script qui vend</h1><p class="sub">Génère 4 messages calibrés sur le cerveau de ton prospect.</p>
    <div class="field"><textarea id="tk-offre" rows="3" placeholder="Ce que tu vends, à quel prix...">${esc(tkState.offre)}</textarea></div>
    <div class="field"><div class="flabel">Profil</div><div class="sgrid">${profils.map(p => `<div class="sitem ${tkState.profil === p ? 'on' : ''}" onclick="tkState.profil='${p}';renderTrocKit();"><div class="sname">${p.replace('_',' ')}</div></div>`).join('')}</div></div>
    <div class="field"><div class="flabel">Mode</div><div class="sgrid c3"><div class="sitem ${tkState.mode==='désir'?'on':''}" onclick="tkState.mode='désir';renderTrocKit();"><div class="sname">🟢 Désir</div></div><div class="sitem ${tkState.mode==='peur'?'on':''}" onclick="tkState.mode='peur';renderTrocKit();"><div class="sname">🔴 Peur</div></div></div></div>
    <button class="btn btn-main" onclick="runTrocKit()">Générer les 4 scripts →</button>
    <div id="tk-prog" style="display:none;" class="prog-wrap"><div class="prog-title">Calibration...</div></div>
    <div id="tk-error" style="display:none;"></div><div id="tk-result" style="display:none;"></div>`);
}

window.runTrocKit = async function() {
  const offre = document.getElementById('tk-offre').value.trim();
  if (!offre) { document.getElementById('tk-error').style.display=''; document.getElementById('tk-error').innerHTML='<div class="err-box">⚠ Décris ton offre.</div>'; return; }
  tkState.offre = offre;
  document.getElementById('tk-prog').style.display=''; document.getElementById('tk-error').style.display='none'; document.getElementById('tk-result').style.display='none';
  const urg = { AUTOMATISEUR:{style:'organisationnelle',regle:'Urgence de planning.'}, OPTIMISEUR_VALEUR:{style:'mathématique',regle:'Urgence de rentabilité.'}, OPTIMISEUR_PRIX:{style:'transparente',regle:'Le prix est juste.'}, ÉLÉVATEUR:{style:'sociale',regle:'La porte se ferme.'}, LIBÉRATEUR:{style:'inexistante',regle:'Aucune deadline.'}, PEUR:{style:'rassurante',regle:'Aucune pression.'} };
  const dosage = urg[tkState.mode==='peur'?'PEUR':tkState.profil] || urg.AUTOMATISEUR;
  try {
    const raw = await callGemini(`Offre : "${offre}". Profil : ${tkState.profil}. Mode : ${tkState.mode}. Urgence : ${dosage.style}. Génère 4 scripts (séparés par "---SEP---") : Approche, Valeur, Relance, Objection. Mise en Lumière + Permission + CTA doux. JAMAIS "Tape X".`, false, 1200);
    const scripts = raw.split('---SEP---').map(s=>s.trim()).filter(Boolean);
    tkState.scripts = scripts;
    document.getElementById('tk-prog').style.display='none'; document.getElementById('tk-result').style.display='';
    document.getElementById('tk-result').innerHTML = `<div class="ok-box">⚡ ${dosage.style} — ${dosage.regle}</div>${scripts.map(s => `<div class="tk-msg"><div class="tk-body">${esc(s)}</div><button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(s)},this)">Copier</button></div>`).join('')}<button class="btn btn-ghost" onclick="renderTrocKit()">← Modifier</button>`;
  } catch(e) { document.getElementById('tk-prog').style.display='none'; document.getElementById('tk-error').style.display=''; document.getElementById('tk-error').innerHTML=`<div class="err-box">⚠ ${esc(e.message)}</div>`; }
};

/* ═══════════════════════════════════════ ARSENAL FRACTAL ═══════════════════════════ */
window.saveToArsenal = function() {
  if (!state.currentPost) return;
  let nextDay = null;
  for (let d = 2; d <= 30; d += 2) { if (!state.arsenalPosts[d]) { nextDay = d; break; } }
  if (!nextDay) { alert('Mois plein.'); return; }
  const postData = { text:state.currentPost, profil:state.profilData?.profil||'Inconnu', atelier:state.atelier||1, maitre:state.maitre?.nom||'Inconnu', savedAt:Date.now(), jour:nextDay };
  state.arsenalPosts[nextDay] = postData;
  localStorage.setItem('mt_arsenal_posts', JSON.stringify(state.arsenalPosts));
  const btn = document.getElementById('btn-save-arsenal'); if(btn){ btn.textContent='✓ Sauvegardé (Jour '+nextDay+')'; btn.classList.add('saved'); setTimeout(()=>{ btn.textContent='Sauvegarder dans l\'Arsenal'; btn.classList.remove('saved'); },2000); }
};

function renderArsenalFractal(){
  let html = '<div class="eyebrow">Arsenal</div><h1>Ton plan<br><em>de tir.</em></h1><div class="cal-grid">';
  for (let d = 1; d <= 30; d++) {
    const isEven = d % 2 === 0; const post = state.arsenalPosts[d]; const profil = post ? post.profil?.substring(0, 3).toUpperCase() : '';
    if (isEven) {
      if (post) html += `<div class="cal-cell has" data-profil="${profil}" onclick="viewArsenalPost(${d})"><span class="day-num">J${d}</span><span class="day-ep">EP${Math.floor(d/2)}</span></div>`;
      else html += `<div class="cal-cell placeholder" onclick="viewArsenalPost(${d})"><span class="day-num">+</span></div>`;
    } else html += `<div class="cal-cell rest"><span class="day-num">J${d}</span></div>`;
  }
  html += '</div><div id="arsenal-detail" class="day-detail hidden"></div><button class="btn btn-ghost" onclick="switchMode('studio')">← Retour au Studio</button>';
  render(html);
}

window.viewArsenalPost = function(day) {
  const post = state.arsenalPosts[day]; const el = document.getElementById('arsenal-detail');
  if (!post) { el.innerHTML = `<div class="s-eye">Jour ${day} — Vide</div><button class="btn btn-ghost" onclick="switchMode('studio')">→ Aller au Studio</button>`; el.classList.remove('hidden'); return; }
  el.innerHTML = `<div class="s-eye">Jour ${day} — ${post.profil}</div><div class="post-preview">${esc(post.text)}</div><div class="day-actions"><button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(post.text)},this)">Copier</button><button class="btn btn-ghost" onclick="state.biz=state.arsenalPosts[${day}].text;switchMode('studio');renderBrief();">Recycler</button><button class="btn btn-ghost" onclick="dcState.post=state.arsenalPosts[${day}].text;switchMode('deconstruction');renderDeconstruction();">Déconstruire</button><button class="btn btn-ghost" onclick="delete state.arsenalPosts[${day}];localStorage.setItem('mt_arsenal_posts',JSON.stringify(state.arsenalPosts));renderArsenalFractal();">Supprimer</button></div>`;
  el.classList.remove('hidden');
};

// ─── INIT ───
window.onload = function(){
  // 1. Force l'affichage du conteneur principal
  const app = document.getElementById('app');
  if (!app) {
    const newApp = document.createElement('div');
    newApp.id = 'app';
    document.body.prepend(newApp);
  }

  // 2. Initialisation protégée
  try {
    const mk = localStorage.getItem('mt_moment_key');
    const gk = localStorage.getItem('mt_gemini_key');
    const validKeys = ['MKB2000-2022A', 'MT-2024A','MT-2024B','MT-2024C','MT-2024D','MT-2024E','MT-2024F','MT-2024G','MT-2024H','MT-2024I','MT-2024J','MT-2024K','MT-2024L','MT-2024M','MT-2024N','MT-2024O','MT-2024P','MT-2024Q','MT-2024R','MT-2024S','MT-2024T'];
    if (!mk || !validKeys.includes(mk)) {
      state.step = 'unlock';
    } else if (!gk || gk.length < 30) {
      state.step = 'gemini';
    } else {
      state.step = 'brief';
    }
  } catch (e) {
    console.error('Init error:', e);
    state.step = 'unlock';
  }

  // 3. Rendu forcé du premier écran
  renderStudioMode();

  // 4. Sécurité : si après 600ms l'écran est vide, on réessaye
  setTimeout(() => {
    if (!document.getElementById('app')?.innerHTML) {
      renderStudioMode();
    }
  }, 600);
};
</script>
