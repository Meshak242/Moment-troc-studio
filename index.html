<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Moment Troc · Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #080808; --card: #0F0F0F; --card2: #141414; --card3: #1A1A1A;
      --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.18); --gold-line: rgba(201,168,76,0.35); --gold-glow: rgba(201,168,76,0.12);
      --ink: #F0EAD6; --ink-mid: rgba(240,234,214,0.60); --ink-dim: rgba(240,234,214,0.28); --ink-ghost: rgba(240,234,214,0.10);
      --line: rgba(201,168,76,0.10); --line-hard: rgba(201,168,76,0.22); --green: #4a9e6a; --red: #9e4a4a;
      --font-display: 'Bebas Neue','Cormorant Garamond',serif; --font-body: 'Cormorant Garamond',Georgia,serif; --font-mono: 'DM Mono','Courier New',monospace;
      --radius: 2px;
    }
    *,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
    body{
      background:var(--paper); color:var(--ink); font-family:var(--font-body); font-size:1.05rem; line-height:1.7;
      min-height:100vh; padding:28px 18px 120px; max-width:720px; margin:0 auto;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    }
    @keyframes fadeUp{ from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
    @keyframes goldPulse{ 0%,100%{box-shadow:0 0 8px var(--gold-glow);} 50%{box-shadow:0 0 22px rgba(201,168,76,0.28);} }
    @keyframes borderShimmer{ 0%,100%{border-color:var(--gold-line);} 50%{border-color:var(--gold);} }
    .hidden{ display:none!important; } .center{ text-align:center; }
    h1{ font-family:var(--font-display); font-size:clamp(2.8rem,8vw,4.2rem); font-weight:400; line-height:0.95; letter-spacing:0.02em; text-transform:uppercase; color:var(--ink); }
    h1 em{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; color:var(--gold); text-transform:none; font-size:0.85em; display:block; letter-spacing:0; }
    .eyebrow{ font-family:var(--font-mono); font-size:0.65rem; letter-spacing:5px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; opacity:0.85; }
    .sub{ font-family:var(--font-body); font-size:1rem; color:var(--ink-mid); line-height:1.65; margin:14px 0 24px; font-style:italic; }
    textarea,input[type="text"],input[type="password"]{
      width:100%; background:var(--card2); border:1px solid var(--line); border-left:2px solid var(--gold-line);
      color:var(--ink); padding:16px 18px; font-family:var(--font-body); font-size:1rem; line-height:1.7;
      resize:vertical; outline:none; border-radius:var(--radius); transition:border-color 0.3s ease,box-shadow 0.3s ease;
    }
    textarea:focus,input:focus{ border-left-color:var(--gold); box-shadow:inset 0 0 0 1px var(--gold-glow); }
    textarea::placeholder,input::placeholder{ color:var(--ink-dim); font-style:italic; }
    .btn{ display:block; width:100%; padding:15px 20px; border:none; font-family:var(--font-mono); font-size:0.72rem; letter-spacing:4px; text-transform:uppercase; cursor:pointer; transition:all 0.3s ease; margin-top:12px; border-radius:var(--radius); }
    .btn-main{ background:transparent; color:var(--gold); border:1px solid var(--gold-line); border-left:3px solid var(--gold); }
    .btn-main:hover{ background:var(--gold-dim); border-color:var(--gold); box-shadow:0 0 18px var(--gold-glow); letter-spacing:5px; }
    .btn-ghost{ background:transparent; border:1px solid var(--line-hard); color:var(--ink-dim); }
    .btn-ghost:hover{ border-color:var(--gold-line); color:var(--ink); }
    .btn:disabled{ opacity:0.25; cursor:not-allowed; box-shadow:none; letter-spacing:4px; }
    .card{ background:var(--card); border:1px solid var(--line); border-top:2px solid var(--gold-line); padding:22px 20px; margin-bottom:18px; animation:fadeUp 0.4s ease both; border-radius:var(--radius); position:relative; overflow:hidden; }
    .card::before{ content:''; position:absolute; top:0; left:0; width:40px; height:2px; background:var(--gold); }
    .card.gold{ border-top-color:var(--gold); animation:fadeUp 0.4s ease both,goldPulse 4s ease-in-out infinite; }
    .card-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .tag{ display:inline-block; font-family:var(--font-mono); font-size:0.62rem; letter-spacing:2.5px; padding:4px 10px; text-transform:uppercase; border-radius:var(--radius); margin-right:6px; }
    .tag.gold{ background:var(--gold-dim); color:var(--gold); border:1px solid var(--gold-line); }
    .tag.line{ background:transparent; border:1px solid var(--line-hard); color:var(--ink-dim); }
    .tag.active{ background:var(--gold); color:var(--paper); }
    .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid-4{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .maitre-card{ background:var(--card2); border:1px solid var(--line); border-top:2px solid var(--ink-ghost); padding:16px; cursor:pointer; transition:all 0.3s ease; text-align:center; border-radius:var(--radius); }
    .maitre-card:hover{ transform:translateY(-2px); border-top-color:var(--gold-line); box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 12px var(--gold-glow); }
    .maitre-card.selected{ background:var(--gold-dim); border-color:var(--gold-line); border-top-color:var(--gold); }
    .maitre-name{ font-family:var(--font-body); font-size:0.9rem; font-weight:600; margin-bottom:4px; color:var(--ink); }
    .maitre-type{ font-family:var(--font-mono); font-size:0.6rem; color:var(--gold); letter-spacing:2px; text-transform:uppercase; opacity:0.75; }
    .chat-bubble{ background:var(--card2); border:1px solid var(--line); border-left:2px solid var(--gold-line); padding:14px 18px; margin-bottom:10px; border-radius:var(--radius); animation:fadeUp 0.3s ease both; font-family:var(--font-body); font-size:0.95rem; color:var(--ink-mid); }
    .chat-bubble strong{ color:var(--gold); font-family:var(--font-mono); font-size:0.65rem; letter-spacing:3px; text-transform:uppercase; display:block; margin-bottom:6px; }
    .post-body{ font-family:var(--font-body); font-size:1.15rem; line-height:2; white-space:pre-wrap; color:var(--ink); padding:28px 0; letter-spacing:0.01em; }
    .strat-block{ background:var(--gold-glow); border-left:2px solid var(--gold); padding:14px 18px; margin-bottom:20px; font-family:var(--font-mono); font-size:0.78rem; line-height:1.65; color:var(--ink-mid); border-radius:0 var(--radius) var(--radius) 0; animation:goldPulse 4s ease-in-out infinite; }
    .err-box{ background:rgba(158,74,74,0.08); border-left:2px solid var(--red); padding:12px 16px; margin:12px 0; font-family:var(--font-mono); font-size:0.8rem; color:var(--red); border-radius:0 var(--radius) var(--radius) 0; }
    .ok-box{ background:rgba(74,158,106,0.08); border-left:2px solid var(--green); padding:10px 14px; margin:8px 0; font-family:var(--font-mono); font-size:0.8rem; color:var(--green); border-radius:0 var(--radius) var(--radius) 0; }
    .eval-band{ padding:10px 14px; margin-bottom:14px; font-family:var(--font-mono); font-size:0.75rem; border-left:2px solid var(--gold); background:var(--gold-glow); border-radius:0 var(--radius) var(--radius) 0; letter-spacing:1px; }
    .eval-band.green{ border-left-color:var(--green); background:rgba(74,158,106,0.06); color:var(--green); }
    .eval-band.red{ border-left-color:var(--red); background:rgba(158,74,74,0.06); color:var(--red); }
    .cal-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-top:16px; }
    .cal-cell{ aspect-ratio:1; background:var(--card2); border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all 0.25s ease; position:relative; user-select:none; border-radius:var(--radius); font-family:var(--font-mono); }
    .cal-cell .day-num{ font-family:var(--font-mono); font-size:1rem; color:var(--ink-dim); line-height:1; }
    .cal-cell .day-ep{ font-family:var(--font-mono); font-size:0.55rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-top:3px; opacity:0.85; }
    .cal-cell.rest{ opacity:0.22; cursor:default; pointer-events:none; }
    .cal-cell.rest .day-num{ color:var(--ink-dim); }
    .cal-cell.has{ background:var(--card); border:1px solid var(--gold-line); border-top:2px solid var(--gold); cursor:pointer; }
    .cal-cell.has .day-num{ color:var(--ink); font-weight:500; }
    .cal-cell.has:hover{ background:var(--gold-dim); border-color:var(--gold); box-shadow:0 0 14px var(--gold-glow),inset 0 0 8px var(--gold-glow); transform:translateY(-1px); }
    .cal-cell.has::before{ content:attr(data-profil); position:absolute; top:4px; right:5px; font-family:var(--font-mono); font-size:0.42rem; letter-spacing:1px; text-transform:uppercase; color:var(--gold); opacity:0.7; }
    .cal-cell.active-day{ border:1px solid var(--gold); box-shadow:0 0 12px var(--gold-glow); animation:borderShimmer 3s ease-in-out infinite; }
    .cal-cell.placeholder{ cursor:pointer; border-top:2px solid var(--ink-ghost); }
    .cal-cell.placeholder:hover{ border-top-color:var(--gold-line); background:var(--card); }
    .cal-cell.placeholder .day-num{ color:var(--ink-dim); }
    .day-detail{ background:var(--card); border:1px solid var(--line); border-top:2px solid var(--gold); padding:22px 20px; margin-top:16px; animation:fadeUp 0.35s ease both; border-radius:var(--radius); position:relative; }
    .day-detail::before{ content:''; position:absolute; top:0; left:0; width:60px; height:2px; background:var(--gold); }
    .day-detail .post-preview{ font-family:var(--font-body); font-size:1rem; line-height:1.85; color:var(--ink-mid); white-space:pre-wrap; margin:14px 0; border-left:1px solid var(--gold-line); padding-left:16px; font-style:italic; }
    .day-actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .day-actions .btn{ flex:1; min-width:120px; margin-top:0; }
    .bottom-nav{ position:fixed; bottom:0; left:0; right:0; background:rgba(8,8,8,0.96); border-top:1px solid var(--line-hard); display:flex; justify-content:space-around; padding:6px 0 8px; z-index:1000; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
    .nav-item{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 14px; transition:all 0.3s ease; font-family:var(--font-mono); font-size:0.58rem; letter-spacing:1.5px; color:var(--ink-dim); text-transform:uppercase; border:none; background:none; position:relative; }
    .nav-item::after{ content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:1px; background:var(--gold); transition:width 0.3s ease; }
    .nav-item.active{ color:var(--gold); }
    .nav-item.active::after{ width:24px; }
    .nav-icon{ font-size:1.1rem; opacity:0.75; transition:opacity 0.3s ease; }
    .nav-item.active .nav-icon{ opacity:1; }
    .nav-item:hover{ color:var(--ink); }
    a{ color:var(--gold); text-decoration:none; border-bottom:1px solid var(--gold-dim); transition:border-color 0.2s ease; }
    a:hover{ border-bottom-color:var(--gold); }
    @media(max-width:500px){ .grid-2{ grid-template-columns:1fr; } .grid-4{ grid-template-columns:1fr 1fr; } .cal-grid{ gap:6px; } h1{ font-size:2.6rem; } }
  </style>
</head>
<body>
<div id="app"></div>
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchMode('studio')"><span class="nav-icon">🎯</span>Studio</button>
  <button class="nav-item" onclick="switchMode('deconstruction')"><span class="nav-icon">🔬</span>Déconstruire</button>
  <button class="nav-item" onclick="switchMode('trockit')"><span class="nav-icon">💎</span>Troc Kit</button>
  <button class="nav-item" onclick="switchMode('arsenal')"><span class="nav-icon">📅</span>Arsenal</button>
</nav>

<script>
// ═══════════════════════════════════════
// MOMENT TROC · STUDIO — Final Design Intégré
// ═══════════════════════════════════════

// ─── Clés ───
const MASTER_KEY = 'MKB2000-2022A';
const VALID_KEYS = ['MT-2024A','MT-2024B','MT-2024C','MT-2024D','MT-2024E','MT-2024F','MT-2024G','MT-2024H','MT-2024I','MT-2024J','MT-2024K','MT-2024L','MT-2024M','MT-2024N','MT-2024O','MT-2024P','MT-2024Q','MT-2024R','MT-2024S','MT-2024T'];
function getMomentKey(){ return localStorage.getItem('mt_moment_key'); }
function setMomentKey(k){ localStorage.setItem('mt_moment_key', k); }
function getGeminiKey(){ return localStorage.getItem('mt_gemini_key'); }
function setGeminiKey(k){ localStorage.setItem('mt_gemini_key', k); }

// ─── API Gemini ───
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=';
async function callGemini(prompt, useSearch=false, maxTokens=1400){
  const key = getGeminiKey();
  if(!key) throw new Error('Clé Gemini manquante');
  const body = { contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.88, maxOutputTokens:maxTokens} };
  if(useSearch) body.tools = [{google_search:{}}];
  const controller = new AbortController(); const timeout = setTimeout(() => controller.abort(), 12000);
  const res = await fetch(GEMINI_URL+key, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body), signal: controller.signal });
  clearTimeout(timeout);
  if(!res.ok){ const e = await res.json().catch(()=>({})); if(res.status===429) throw new Error('Limite API atteinte. Reviens dans 1 minute.'); throw new Error(e?.error?.message||'Erreur API'); }
  const data = await res.json(); const text = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
  return text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/#{1,6}\s/g,'').trim();
}

// ─── Helpers ───
const app = document.getElementById('app');
function render(html){ app.innerHTML = html; }
function esc(s){ return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyTxt(text, btn){ navigator.clipboard.writeText(text).then(()=>{ btn.textContent='✓ Copié'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='Copier'; btn.classList.remove('copied'); },2000); }); }

// ─── Profils ───
const PROFILS = {
  AUTOMATISEUR: { organe:'Cortex Préfrontal', desir:'Un rail clair sans options', peur:'Le chaos, la surcharge mentale' },
  OPTIMISEUR_VALEUR: { organe:'Striatum', desir:'Le meilleur retour sur investissement', peur:'Le mauvais investissement' },
  OPTIMISEUR_PRIX: { organe:'Insula', desir:'Le juste prix', peur:'L\'arnaque, la douleur du prix' },
  ÉLÉVATEUR: { organe:'Noyau Accumbens', desir:'Le statut, l\'image', peur:'L\'exclusion, la honte sociale' },
  LIBÉRATEUR: { organe:'Cortex Cingulaire', desir:'La singularité, la liberté', peur:'Les cases, le générique' }
};

// ─── Maîtres ───
const MAITRES = [
  {id:'bismarck',nom:'Otto von Bismarck',categorie:'Stratège Silencieux',ton:'La force tranquille, le pragmatisme froid.'},
  {id:'will',nom:'Will Aime',categorie:'Miroir Vivant',ton:'Un "il" qui devient "tu". Fin sans résolution.'},
  {id:'itachi',nom:'Itachi Uchiha',categorie:'Briseur de Réalité',ton:'Projection noire puis réveil brutal.'},
  {id:'scofield',nom:'Michael Scofield',categorie:'Architecte de l\'Ombre',ton:'Plan froid, imparable, chirurgical.'},
  {id:'tyrion',nom:'Tyrion Lannister',categorie:'Miroir Vivant',ton:'La faiblesse retournée en pouvoir suprême.'},
  {id:'hannibal',nom:'Hannibal Lecter',categorie:'Miroir Vivant',ton:'L\'observation si fine qu\'elle en devient terrifiante.'},
  {id:'joker',nom:'Le Joker',categorie:'Miroir Vivant',ton:'La provocation qui révèle la vraie nature.'},
  {id:'moriarty',nom:'James Moriarty',categorie:'Architecte de l\'Ombre',ton:'Toujours trois coups d\'avance sur la pensée du lecteur.'},
  {id:'palpatine',nom:'Empereur Palpatine',categorie:'Architecte de l\'Ombre',ton:'Le faux mentor, le piège à long terme.'},
  {id:'iago',nom:'Iago',categorie:'Architecte de l\'Ombre',ton:'Le poison des mots qui dégrade la certitude.'},
  {id:'cobb',nom:'Dominick Cobb',categorie:'Briseur de Réalité',ton:'Plante une idée dans l\'esprit en faisant croire qu\'elle vient du lecteur.'},
  {id:'mrrobot',nom:'Mr. Robot',categorie:'Briseur de Réalité',ton:'La rupture du système, le bug dans la matrice.'},
  {id:'tyler',nom:'Tyler Durden',categorie:'Briseur de Réalité',ton:'Brûler le faux confort pour révéler la vérité nue.'},
  {id:'baelish',nom:'Petyr Baelish',categorie:'Stratège Silencieux',ton:'Tirer avantage de chaque événement, surtout les pires.'},
  {id:'frank',nom:'Frank Underwood',categorie:'Stratège Silencieux',ton:'La confession directe au lecteur, faire de lui un complice.'},
  {id:'v',nom:'V',categorie:'Stratège Silencieux',ton:'Faire exploser un système de croyances pour le reconstruire.'}
];
const CATEGORIES = ['Architecte de l\'Ombre','Briseur de Réalité','Miroir Vivant','Stratège Silencieux'];

// ─── États globaux ───
const state = {
  step:'unlock', mode:'studio', biz:'', dialogueAnswers:[], profilData:null, profilMode:'désir',
  atelier:null, format:null, maitre:null, currentPost:null, evalData:null, stratData:null,
  arsenal:JSON.parse(localStorage.getItem('mt_arsenal')||'[]'),
  arsenalPosts: JSON.parse(localStorage.getItem('mt_arsenal_posts')||'{}')
};
const dcState = { step:'input', post:'', contexte:'', analyse:null, contreAngle:null };
const tkState = { offre:'', profil:'AUTOMATISEUR', mode:'désir', scripts:null };

// ─── Navigation ───
window.switchMode = function(m) {
  state.mode = m;
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', ['studio','deconstruction','trockit','arsenal'][i] === m);
  });
  if (m === 'studio') renderStudioMode();
  else if (m === 'deconstruction') renderDeconstruction();
  else if (m === 'trockit') renderTrocKit();
  else if (m === 'arsenal') renderCalendar();
};

/* ═══════════════════════════════════════
   MODE STUDIO
   ═══════════════════════════════════════ */
function renderStudioMode() {
  if (state.step === 'unlock') renderUnlock();
  else if (state.step === 'gemini') renderGeminiGate();
  else if (state.step === 'brief') renderBrief();
  else if (state.step === 'dialogue') renderDialogue();
  else if (state.step === 'profil') renderProfil();
  else if (state.step === 'atelier') renderAtelier();
  else if (state.step === 'format') renderFormat();
  else if (state.step === 'pantheon') renderPantheon();
  else if (state.step === 'result') renderResult();
}

function renderUnlock(){
  render(`<div class="center" style="margin-top:60px;"><div class="eyebrow">Moment Troc · Studio</div><h1>Clé<br>d'Accès</h1><p class="sub">Entre la clé fournie par Kabou Meshak.</p><input id="key-input" type="text" placeholder="MT-2024X..." autocomplete="off" style="text-transform:uppercase;" /><div id="gate-err" style="min-height:20px;color:var(--red);font-size:0.8rem;margin-top:8px;"></div><button class="btn btn-main" onclick="validateMomentKey()">Entrer →</button></div>`);
}
window.validateMomentKey = function(){
  const k = document.getElementById('key-input').value.trim().toUpperCase();
  const err = document.getElementById('gate-err');
  if(k===MASTER_KEY||VALID_KEYS.includes(k)){ setMomentKey(k); state.step='gemini'; renderGeminiGate(); }
  else { err.textContent = 'Clé invalide.'; }
};

function renderGeminiGate(){
  render(`<div class="center" style="margin-top:60px;"><div class="eyebrow">Étape 2/2</div><h1>Clé API<br>Gemini</h1><p class="sub">Gratuit sur <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></p><input id="gemini-input" type="password" placeholder="AIza..." autocomplete="off" /><div id="gemini-err" style="min-height:20px;color:var(--red);font-size:0.8rem;margin-top:8px;"></div><button class="btn btn-main" onclick="validateGeminiKey()">Activer le moteur →</button></div>`);
}
window.validateGeminiKey = async function(){
  const k = document.getElementById('gemini-input').value.trim();
  const err = document.getElementById('gemini-err');
  if(!k.startsWith('AIza')||k.length<30){ err.textContent='Clé invalide.'; return; }
  try{
    const test = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${k}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:'OK'}]}],generationConfig:{maxOutputTokens:3}})
    });
    if(!test.ok) throw new Error('Clé rejetée');
    setGeminiKey(k); state.step='brief'; renderBrief();
  }catch(e){ err.textContent = 'Clé rejetée par Gemini. Vérifie ton compte.'; }
};

function renderBrief(){
  const saved = JSON.parse(localStorage.getItem('mt_brief')||'{}');
  if(saved.biz){ state.biz = saved.biz; }

  for (let d = 2; d <= 30; d += 2) { if (!state.arsenalPosts[d]) { nextDay = d; break; } }
  if (!nextDay) { alert('Tous les jours pairs sont remplis pour ce mois. Supprime un post pour libérer une case.'); return; }
  const postData = { text: state.currentPost, profil: state.profilData?.profil || 'Inconnu', atelier: state.atelier || 1, maitre: state.maitre?.nom || 'Inconnu', format: state.format || 'Inconnu', savedAt: Date.now(), jour: nextDay };
  state.arsenalPosts[nextDay] = postData;
  localStorage.setItem('mt_arsenal_posts', JSON.stringify(state.arsenalPosts));
  const saveBtn = document.getElementById('btn-save-arsenal');
  if (saveBtn) { saveBtn.textContent = '✓ Sauvegardé (Jour ' + nextDay + ')'; saveBtn.classList.add('saved'); setTimeout(() => { saveBtn.textContent = 'Sauvegarder dans l\'Arsenal'; saveBtn.classList.remove('saved'); }, 2000); }

  let html = '<div class="eyebrow">Arsenal — Calendrier 30 Jours</div><h1>Ton<br><em>plan de tir.</em></h1><p class="sub">Chaque post sauvegardé se place automatiquement sur un jour pair. Clique sur une case pour lire, recycler ou déconstruire.</p>';
  html += '<div class="cal-grid">';
  for (let d = 1; d <= 30; d++) {
    const isEven = d % 2 === 0; const hasPost = state.arsenalPosts[d]; const profil = hasPost ? hasPost.profil?.substring(0, 3).toUpperCase() : '';
    if (isEven) {
      if (hasPost) { html += `<div class="cal-cell has active" data-profil="${profil}" onclick="viewArsenalPost(${d})"><span class="day-num">J${d}</span><span class="day-ep">EP${Math.floor(d/2)}</span></div>`; }
      else { html += `<div class="cal-cell placeholder" onclick="viewArsenalPost(${d})"><span class="day-num">+</span></div>`; }
    } else { html += `<div class="cal-cell rest"><span class="day-num">J${d}</span></div>`; }
  }
  html += '</div><div id="arsenal-detail" class="day-detail hidden"></div>';
  render(html);
};

window.viewArsenalPost = function(day) {
  const post = state.arsenalPosts[day]; const detailEl = document.getElementById('arsenal-detail');
  if (!post) { detailEl.innerHTML = `<div class="s-eye">Jour ${day} — Vide</div><p style="color:var(--ink-dim);">Aucun post sauvegardé ici. Génère un post dans le Studio et sauvegarde-le pour le placer ici.</p><button class="btn btn-ghost" onclick="switchMode('studio')">→ Aller au Studio</button>`; detailEl.classList.remove('hidden'); return; }
  detailEl.innerHTML = `<div class="s-eye">Jour ${day} — ${post.profil} · Atelier ${post.atelier}</div><div class="ptags" style="margin-bottom:8px;"><span class="tag gold">${post.profil}</span><span class="tag gold">${post.maitre}</span></div><div class="post-preview">${esc(post.text)}</div><div class="day-actions">
    <button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(post.text)}, this)">Copier</button>
    <button class="btn btn-ghost" onclick="recycleArsenalPost(${day})">Recycler</button>
    <button class="btn btn-ghost" onclick="deconstructArsenalPost(${day})">Déconstruire</button>
    <button class="btn btn-ghost" onclick="deleteArsenalPost(${day})">Supprimer</button></div>`;
  detailEl.classList.remove('hidden');
};

window.recycleArsenalPost = function(day) { const post = state.arsenalPosts[day]; if (!post) return; state.biz = post.text; localStorage.setItem('mt_brief', JSON.stringify({ biz: post.text })); state.step = 'brief'; switchMode('studio'); renderBrief(); };
window.deconstructArsenalPost = function(day) { const post = state.arsenalPosts[day]; if (!post) return; dcState.post = post.text; dcState.contexte = `Post sauvegardé de l'Arsenal (Jour ${day}, Profil ${post.profil}, Maître ${post.maitre})`; switchMode('deconstruction'); renderDeconstruction(); };
window.deleteArsenalPost = function(day) { if (confirm(`Supprimer le post du Jour ${day} ?`)) { delete state.arsenalPosts[day]; localStorage.setItem('mt_arsenal_posts', JSON.stringify(state.arsenalPosts)); renderCalendar(); } };

// ─── INIT ───
window.onload = function(){
  const mk = getMomentKey();
  if(!mk||(mk!==MASTER_KEY&&!VALID_KEYS.includes(mk))){ state.step='unlock'; }
  else if(!getGeminiKey()){ state.step='gemini'; }
  else { state.step='brief'; }
  renderStudioMode();
};
</script>
</body>
</html>
