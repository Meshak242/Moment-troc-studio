<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Moment Troc · Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #F0EAD6; --paper: #0D0D0D; --card: #141414; --card2: #1A1A1A;
      --rust: #D4541A; --rust-dim: rgba(212,84,26,0.12); --rust-line: rgba(212,84,26,0.3);
      --ink-dim: rgba(240,234,214,0.25); --ink-mid: rgba(240,234,214,0.55);
      --line: rgba(240,234,214,0.07); --gold: #C9A84C; --green: #4a9e4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--paper); color: var(--ink);
      font-family: 'Space Mono', 'Courier New', monospace;
      min-height: 100vh; padding: 24px 16px 120px; max-width: 720px; margin: 0 auto;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 8px rgba(201,168,76,0.15); } 50% { box-shadow: 0 0 18px rgba(201,168,76,0.35); } }
    @keyframes borderPulse { 0%, 100% { border-left-color: var(--gold); } 50% { border-left-color: var(--rust); } }

    .hidden { display: none !important; }
    .center { text-align: center; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 900; line-height: 1; letter-spacing: -0.5px; }
    h1 em { font-style: italic; color: var(--rust); }
    .eyebrow { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--rust); margin-bottom: 8px; }
    .sub { color: var(--ink-mid); font-size: 0.9rem; line-height: 1.6; margin: 16px 0 24px; }

    textarea, input {
      width: 100%; background: var(--card2); border: 1px solid var(--line);
      border-top: 2px solid var(--ink-dim); color: var(--ink);
      padding: 16px; font-family: inherit; font-size: 1rem;
      resize: vertical; outline: none; line-height: 1.7; border-radius: 0;
      transition: border-color 0.3s ease;
    }
    textarea:focus, input:focus { border-top-color: var(--rust); }
    textarea::placeholder, input::placeholder { color: var(--ink-dim); }

    .btn {
      display: block; width: 100%; padding: 16px; border: none;
      font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease; margin-top: 12px;
      font-family: 'Archivo Black', sans-serif; border-radius: 2px;
    }
    .btn-main { background: var(--rust); color: var(--ink); }
    .btn-main:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(212,84,26,0.3); }
    .btn-ghost { background: transparent; border: 1px solid var(--rust-line); color: var(--rust); }
    .btn-ghost:hover { border-color: var(--rust); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

    .card {
      background: var(--card); border: 1px solid var(--line);
      border-top: 3px solid var(--rust); padding: 20px; margin-bottom: 20px;
      animation: fadeUp 0.4s ease both;
    }
    .card.gold { border-top-color: var(--gold); animation: fadeUp 0.4s ease both, glowPulse 3s ease-in-out infinite; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }

    .tag {
      display: inline-block; background: var(--rust); color: var(--ink);
      font-size: 0.7rem; letter-spacing: 2px; padding: 4px 10px; text-transform: uppercase; margin-right: 6px; border-radius: 2px;
    }
    .tag.gold { background: var(--gold); color: var(--paper); }
    .tag.line { background: transparent; border: 1px solid var(--line); color: var(--ink-dim); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

    .maitre-card {
      background: var(--card2); border: 1px solid var(--line); border-top: 3px solid var(--ink-dim);
      padding: 16px; cursor: pointer; transition: all 0.3s ease; text-align: center; border-radius: 2px;
    }
    .maitre-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); border-top-color: var(--rust); }
    .maitre-card.selected { background: var(--rust-dim); border-color: var(--rust); }
    .maitre-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
    .maitre-type { font-size: 0.7rem; color: var(--ink-dim); }

    .chat-bubble {
      background: var(--card); border: 1px solid var(--line);
      padding: 14px 18px; margin-bottom: 12px; border-radius: 2px;
      animation: fadeUp 0.3s ease both;
    }

    .post-body {
      font-family: 'Playfair Display', serif; font-size: 1.1rem;
      line-height: 1.9; white-space: pre-wrap; color: var(--ink); padding: 24px 0;
    }

    .strat-block {
      background: rgba(201,168,76,0.06); border-left: 3px solid var(--gold);
      padding: 14px 16px; margin-bottom: 20px; font-size: 0.8rem; line-height: 1.6; color: var(--ink-mid);
      animation: glowPulse 3s ease-in-out infinite, borderPulse 4s ease-in-out infinite;
    }

    .err-box { background: rgba(212,84,26,0.1); border-left: 3px solid var(--rust); padding: 14px 16px; margin: 12px 0; font-size: 0.9rem; color: var(--rust); }
    .ok-box { background: rgba(74,158,74,0.1); border-left: 3px solid var(--green); padding: 10px 14px; margin: 8px 0; font-size: 0.9rem; color: var(--green); }
    .eval-band {
      padding: 10px 14px; margin-bottom: 16px; font-size: 0.8rem;
      border-left: 3px solid var(--gold); background: rgba(201,168,76,0.08);
    }
    .eval-band.green { border-left-color: var(--green); background: rgba(74,158,74,0.08); }
    .eval-band.red { border-left-color: var(--rust); background: rgba(212,84,26,0.08); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(13,13,13,0.95); border-top: 1px solid var(--line);
      display: flex; justify-content: space-around; padding: 6px 0;
      z-index: 1000; backdrop-filter: blur(10px);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 8px 12px; transition: all 0.3s ease;
      font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 1px;
      color: var(--ink-dim); text-transform: uppercase; border: none; background: none;
    }
    .nav-item.active { color: var(--rust); }
    .nav-icon { font-size: 1.2rem; }

    @media (max-width: 500px) { .grid-2, .grid-4 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div id="app"></div>
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchMode('studio')"><span class="nav-icon">🎯</span>Studio</button>
  <button class="nav-item" onclick="switchMode('deconstruction')"><span class="nav-icon">🔬</span>Déconstruire</button>
  <button class="nav-item" onclick="switchMode('trockit')"><span class="nav-icon">💎</span>Troc Kit</button>
</nav>

<script>
// ═══════════════════════════════════════
// MOMENT TROC · STUDIO — Fichier Final
// ═══════════════════════════════════════

// ─── Clés ───
const MASTER_KEY = 'MKB2000-2022A';
const VALID_KEYS = ['MT-2024A','MT-2024B','MT-2024C','MT-2024D','MT-2024E','MT-2024F','MT-2024G','MT-2024H','MT-2024I','MT-2024J','MT-2024K','MT-2024L','MT-2024M','MT-2024N','MT-2024O','MT-2024P','MT-2024Q','MT-2024R','MT-2024S','MT-2024T'];
function getMomentKey(){ return localStorage.getItem('mt_moment_key'); }
function setMomentKey(k){ localStorage.setItem('mt_moment_key', k); }
function getGeminiKey(){ return localStorage.getItem('mt_gemini_key'); }
function setGeminiKey(k){ localStorage.setItem('mt_gemini_key', k); }

// ─── API Gemini ───
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=';
async function callGemini(prompt, useSearch=false, maxTokens=1400){
  const key = getGeminiKey();
  if(!key) throw new Error('Clé Gemini manquante');
  const body = {
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.88, maxOutputTokens:maxTokens}
  };
  if(useSearch) body.tools = [{google_search:{}}];
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 12000);
  const res = await fetch(GEMINI_URL+key, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body), signal: controller.signal
  });
  clearTimeout(timeout);
  if(!res.ok){
    const e = await res.json().catch(()=>({}));
    if(res.status===429) throw new Error('Limite API atteinte. Reviens dans 1 minute.');
    throw new Error(e?.error?.message||'Erreur API');
  }
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
  return text.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/#{1,6}\s/g,'').trim();
}

// ─── Helpers ───
const app = document.getElementById('app');
function render(html){ app.innerHTML = html; }
function esc(s){ return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyTxt(text, btn){ navigator.clipboard.writeText(text).then(()=>{ btn.textContent='✓ Copié'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='Copier'; btn.classList.remove('copied'); },2000); }); }

// ─── Profils ───
const PROFILS = {
  AUTOMATISEUR: { organe:'Cortex Préfrontal', desir:'Un rail clair sans options', peur:'Le chaos, la surcharge mentale' },
  OPTIMISEUR_VALEUR: { organe:'Striatum', desir:'Le meilleur retour sur investissement', peur:'Le mauvais investissement' },
  OPTIMISEUR_PRIX: { organe:'Insula', desir:'Le juste prix', peur:'L\'arnaque, la douleur du prix' },
  ÉLÉVATEUR: { organe:'Noyau Accumbens', desir:'Le statut, l\'image', peur:'L\'exclusion, la honte sociale' },
  LIBÉRATEUR: { organe:'Cortex Cingulaire', desir:'La singularité, la liberté', peur:'Les cases, le générique' }
};

// ─── Maîtres ───
const MAITRES = [
  {id:'bismarck',nom:'Otto von Bismarck',categorie:'Stratège Silencieux',ton:'La force tranquille, le pragmatisme froid.'},
  {id:'will',nom:'Will Aime',categorie:'Miroir Vivant',ton:'Un "il" qui devient "tu". Fin sans résolution.'},
  {id:'itachi',nom:'Itachi Uchiha',categorie:'Briseur de Réalité',ton:'Projection noire puis réveil brutal.'},
  {id:'scofield',nom:'Michael Scofield',categorie:'Architecte de l\'Ombre',ton:'Plan froid, imparable, chirurgical.'},
  {id:'tyrion',nom:'Tyrion Lannister',categorie:'Miroir Vivant',ton:'La faiblesse retournée en pouvoir suprême.'},
  {id:'hannibal',nom:'Hannibal Lecter',categorie:'Miroir Vivant',ton:'L\'observation si fine qu\'elle en devient terrifiante.'},
  {id:'joker',nom:'Le Joker',categorie:'Miroir Vivant',ton:'La provocation qui révèle la vraie nature.'},
  {id:'moriarty',nom:'James Moriarty',categorie:'Architecte de l\'Ombre',ton:'Toujours trois coups d\'avance sur la pensée du lecteur.'},
  {id:'palpatine',nom:'Empereur Palpatine',categorie:'Architecte de l\'Ombre',ton:'Le faux mentor, le piège à long terme.'},
  {id:'iago',nom:'Iago',categorie:'Architecte de l\'Ombre',ton:'Le poison des mots qui dégrade la certitude.'},
  {id:'cobb',nom:'Dominick Cobb',categorie:'Briseur de Réalité',ton:'Plante une idée dans l\'esprit en faisant croire qu\'elle vient du lecteur.'},
  {id:'mrrobot',nom:'Mr. Robot',categorie:'Briseur de Réalité',ton:'La rupture du système, le bug dans la matrice.'},
  {id:'tyler',nom:'Tyler Durden',categorie:'Briseur de Réalité',ton:'Brûler le faux confort pour révéler la vérité nue.'},
  {id:'baelish',nom:'Petyr Baelish',categorie:'Stratège Silencieux',ton:'Tirer avantage de chaque événement, surtout les pires.'},
  {id:'frank',nom:'Frank Underwood',categorie:'Stratège Silencieux',ton:'La confession directe au lecteur, faire de lui un complice.'},
  {id:'v',nom:'V',categorie:'Stratège Silencieux',ton:'Faire exploser un système de croyances pour le reconstruire.'}
];
const CATEGORIES = ['Architecte de l\'Ombre','Briseur de Réalité','Miroir Vivant','Stratège Silencieux'];

// ─── États globaux ───
const state = {
  step:'unlock', mode:'studio', biz:'', dialogueAnswers:[], profilData:null, profilMode:'désir',
  atelier:null, format:null, maitre:null, currentPost:null, evalData:null, stratData:null,
  arsenal:JSON.parse(localStorage.getItem('mt_arsenal')||'[]')
};

const dcState = { step:'input', post:'', contexte:'', analyse:null, contreAngle:null };
const tkState = { offre:'', profil:'AUTOMATISEUR', mode:'désir', scripts:null };

// ─── Navigation ───
window.switchMode = function(m) {
  state.mode = m;
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', ['studio','deconstruction','trockit'][i] === m);
  });
  if (m === 'studio') renderStudioMode();
  else if (m === 'deconstruction') renderDeconstruction();
  else if (m === 'trockit') renderTrocKit();
};

/* ═══════════════════════════════════════
   MODE STUDIO
   ═══════════════════════════════════════ */
function renderStudioMode() {
  if (state.step === 'unlock') renderUnlock();
  else if (state.step === 'gemini') renderGeminiGate();
  else if (state.step === 'brief') renderBrief();
  else if (state.step === 'dialogue') renderDialogue();
  else if (state.step === 'profil') renderProfil();
  else if (state.step === 'atelier') renderAtelier();
  else if (state.step === 'format') renderFormat();
  else if (state.step === 'pantheon') renderPantheon();
  else if (state.step === 'result') renderResult();
}

function renderUnlock(){
  render(`<div class="center" style="margin-top:60px;"><div class="eyebrow">Moment Troc · Studio</div><h1>Clé<br>d'Accès</h1><p class="sub">Entre la clé fournie par Kabou Meshak.</p><input id="key-input" type="text" placeholder="MT-2024X..." autocomplete="off" style="text-transform:uppercase;" /><div id="gate-err" style="min-height:20px;color:var(--rust);font-size:0.8rem;margin-top:8px;"></div><button class="btn btn-main" onclick="validateMomentKey()">Entrer →</button></div>`);
}
window.validateMomentKey = function(){
  const k = document.getElementById('key-input').value.trim().toUpperCase();
  const err = document.getElementById('gate-err');
  if(k===MASTER_KEY||VALID_KEYS.includes(k)){ setMomentKey(k); state.step='gemini'; renderGeminiGate(); }
  else { err.textContent = 'Clé invalide.'; }
};

function renderGeminiGate(){
  render(`<div class="center" style="margin-top:60px;"><div class="eyebrow">Étape 2/2</div><h1>Clé API<br>Gemini</h1><p class="sub">Gratuit sur <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--rust);">aistudio.google.com</a></p><input id="gemini-input" type="password" placeholder="AIza..." autocomplete="off" /><div id="gemini-err" style="min-height:20px;color:var(--rust);font-size:0.8rem;margin-top:8px;"></div><button class="btn btn-main" onclick="validateGeminiKey()">Activer le moteur →</button></div>`);
}
window.validateGeminiKey = async function(){
  const k = document.getElementById('gemini-input').value.trim();
  const err = document.getElementById('gemini-err');
  if(!k.startsWith('AIza')||k.length<30){ err.textContent='Clé invalide.'; return; }
  try{
    const test = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${k}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:'OK'}]}],generationConfig:{maxOutputTokens:3}})
    });
    if(!test.ok) throw new Error('Clé rejetée');
    setGeminiKey(k); state.step='brief'; renderBrief();
  }catch(e){ err.textContent = 'Clé rejetée par Gemini. Vérifie ton compte.'; }
};

function renderBrief(){
  const saved = JSON.parse(localStorage.getItem('mt_brief')||'{}');
  if(saved.biz){ state.biz = saved.biz; }
  render(`<div class="eyebrow">Brief</div><h1>Décharge<br><em>ton idée.</em></h1><p class="sub">Décris ton business, ta cible, le problème. Même en vrac.</p><textarea id="brief-input" rows="6" placeholder="Ex: Je vends une formation en ligne aux entrepreneurs africains qui n'arrivent pas à gérer leur trésorerie...">${esc(state.biz)}</textarea><button class="btn btn-main" onclick="submitBrief()">Analyser mon marché →</button>`);
}
window.submitBrief = async function(){
  const raw = document.getElementById('brief-input').value.trim();
  if(!raw||raw.length<15){ alert('Décris ton business un peu plus.'); return; }
  state.biz = raw;
  localStorage.setItem('mt_brief',JSON.stringify({biz:raw}));
  state.step='dialogue'; renderDialogue();
  try{
    const qPrompt = `Tu es l'agent Moment Troc. Business : "${raw}". Pose exactement 2 questions stratégiques pour affiner le brief. Choisis parmi : "Qu'est-ce que ton client se dit quand il n'arrive pas à dormir ?", "Qu'a-t-il déjà essayé ? Pourquoi ça n'a pas marché ?", "Qui est son plus grand concurrent ? Pourquoi es-tu meilleur ?". Retourne chaque question sur une ligne séparée, sans numéro.`;
    const qRaw = await callGemini(qPrompt, true, 400);
    const questions = qRaw.split('\n').filter(l=>l.trim().length>10).slice(0,2);
    document.getElementById('dialogue-questions').innerHTML = questions.map((q,i)=>`
      <div class="chat-bubble"><strong>Agent</strong> : ${esc(q)}</div>
      <textarea id="dial-answer-${i}" rows="2" placeholder="Ta réponse..."></textarea>
    `).join('');
    document.getElementById('dialogue-box').classList.remove('hidden');
  }catch(e){ document.getElementById('dialogue-err').innerHTML = `<div class="err-box">⚠ ${esc(e.message)}</div>`; }
};
function renderDialogue(){
  render(`<div class="eyebrow">Dialogue</div><h1>L'agent<br><em>t'écoute.</em></h1><div id="dialogue-questions"></div><div id="dialogue-box" class="hidden"><button class="btn btn-main" onclick="submitDialogue()">Continuer →</button></div><div id="dialogue-err"></div>`);
}
window.submitDialogue = async function(){
  const answers = [];
  for(let i=0;i<2;i++){ const el=document.getElementById('dial-answer-'+i); if(el)answers.push(el.value.trim()); }
  state.dialogueAnswers = answers;
  try{
    const detectPrompt = `Tu es un expert du framework Moment Troc. Business : "${state.biz}". Réponses aux questions : "${answers.join(' ')}". Retourne UNIQUEMENT ce JSON (rien d'autre) : {"profil":"AUTOMATISEUR","mode":"peur","organe":"Cortex Préfrontal","tension":"phrase intérieure","simple":"explication simple"}. Profils possibles : AUTOMATISEUR, OPTIMISEUR_VALEUR, OPTIMISEUR_PRIX, ÉLÉVATEUR, LIBÉRATEUR. Mode: désir ou peur.`;
    const raw = await callGemini(detectPrompt, false, 500);
    const match = raw.match(/\{[\s\S]*?\}/);
    if(!match) throw new Error('Profil non détecté');
    state.profilData = JSON.parse(match[0]);
    state.step='profil'; renderProfil();
  }catch(e){ document.getElementById('dialogue-err').innerHTML = `<div class="err-box">⚠ ${esc(e.message)}</div>`; }
};

function renderProfil(){
  const p = state.profilData; const info = PROFILS[p.profil]||PROFILS.AUTOMATISEUR;
  render(`<div class="eyebrow">Profil détecté</div><h1>${esc(p.profil)}<br><em>mode ${esc(p.mode)}</em></h1>
    <div class="card"><div class="tag">${esc(p.organe)}</div><p style="margin-top:12px;font-style:italic;color:var(--ink-mid);">"${esc(p.tension)}"</p><p style="color:var(--ink-dim);margin-top:8px;">${esc(p.simple)}</p></div>
    <div class="grid-2">
      <div class="card ${state.profilMode==='désir'?'':'gold'}" style="cursor:pointer;" onclick="state.profilMode='désir';renderProfil();"><div class="tag">🟢 Désir</div><p style="margin-top:8px;color:var(--ink-mid);">Attiré par : ${esc(info.desir)}</p></div>
      <div class="card ${state.profilMode==='peur'?'':'gold'}" style="cursor:pointer;" onclick="state.profilMode='peur';renderProfil();"><div class="tag">🔴 Peur</div><p style="margin-top:8px;color:var(--ink-mid);">Fuit : ${esc(info.peur)}</p></div>
    </div>
    <button class="btn btn-main" onclick="state.step='atelier';renderAtelier();">Choisir l'Atelier →</button>`);
}

function renderAtelier(){
  render(`<div class="eyebrow">Atelier</div><h1>Choisis<br><em>ta phase.</em></h1>
    <div class="grid-2">
      <div class="card" style="cursor:pointer;" onclick="selectAtelier(1)"><div class="tag">1</div><h3 style="margin-top:8px;">Le Miroir</h3><p style="color:var(--ink-dim);">Implanter l'expertise. Nommer la douleur. Pas de vente.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectAtelier(2)"><div class="tag gold">2</div><h3 style="margin-top:8px;">La Forge</h3><p style="color:var(--ink-dim);">Intensifier la douleur. Se positionner comme la réponse.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectAtelier(3)"><div class="tag line">3</div><h3 style="margin-top:8px;">Le Closing</h3><p style="color:var(--ink-dim);">Vendre. Post calibré + Troc Kit.</p></div>
    </div>
    <button class="btn btn-main" id="btn-atelier-next" onclick="state.step='format';renderFormat();" disabled>Continuer →</button>`);
}
window.selectAtelier = function(id){ state.atelier=id; document.getElementById('btn-atelier-next').disabled=false; };

function renderFormat(){
  render(`<div class="eyebrow">Format</div><h1>Choisis<br><em>ta forme.</em></h1>
    <div class="grid-2" id="format-grid">
      <div class="card" style="cursor:pointer;" onclick="selectFormat('tweet')"><div class="tag">Tweet</div><p style="color:var(--ink-dim);">60-90 mots. Une vérité. Pas de suite.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectFormat('thread')"><div class="tag gold">Thread</div><p style="color:var(--ink-dim);">Post + 4-5 commentaires. Suite en com.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectFormat('courtmetrage')"><div class="tag line">Court Métrage</div><p style="color:var(--ink-dim);">150-200 mots. Scène Wil Aime.</p></div>
      <div class="card" style="cursor:pointer;" onclick="selectFormat('plan')"><div class="tag line">Plan</div><p style="color:var(--ink-dim);">100-130 mots. Étapes. Dernière ligne = piège.</p></div>
    </div>
    <button class="btn btn-main" id="btn-format-next" onclick="state.step='pantheon';renderPantheon();" disabled>Continuer →</button>`);
}
window.selectFormat = function(id){ state.format=id; document.getElementById('btn-format-next').disabled=false; };

function renderPantheon(){
  render(`<div class="eyebrow">Arsenal des Maîtres</div><h1>Choisis<br><em>ton illusion.</em></h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
      <button class="btn btn-ghost" onclick="filterMaitres('Tous')" style="width:auto;padding:8px 14px;font-size:0.7rem;">Tous</button>
      ${CATEGORIES.map(c=>`<button class="btn btn-ghost" onclick="filterMaitres('${c}')" style="width:auto;padding:8px 14px;font-size:0.7rem;">${c}</button>`).join('')}
    </div>
    <div class="grid-2" id="maitres-grid">
      ${MAITRES.map(m=>`<div class="maitre-card" id="maitre-${m.id}" data-cat="${m.categorie}" onclick="selectMaitre('${m.id}')"><div class="maitre-name">${m.nom}</div><div class="maitre-type">${m.categorie}</div><p style="font-size:0.7rem;color:var(--ink-dim);margin-top:6px;">${m.ton}</p></div>`).join('')}
    </div>
    <button class="btn btn-main" id="btn-generate" onclick="generatePost()" disabled>Générer le post →</button>`);
}
window.filterMaitres = function(cat){
  document.querySelectorAll('.maitre-card').forEach(card=>{ card.classList.toggle('hidden', cat!=='Tous' && card.getAttribute('data-cat')!==cat); });
};
window.selectMaitre = function(id){
  state.maitre = MAITRES.find(m=>m.id===id);
  document.querySelectorAll('.maitre-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('maitre-'+id).classList.add('selected');
  document.getElementById('btn-generate').disabled=false;
};

window.generatePost = async function(){
  const p = state.profilData; const info = PROFILS[p.profil]; const m = state.maitre;
  const modeDesc = state.profilMode==='peur'?info.peur:info.desir;
  const atelierDesc = state.atelier===1?'Implanter. Nommer la douleur. Pas de vente. Pas de CTA fort.':state.atelier===2?'Intensifier la douleur. Se positionner comme la réponse évidente.':'Vendre. Déclencher l\'achat.';
  render(`<div class="eyebrow">Génération</div><h1>L'agent<br><em>travaille…</em></h1><div class="card"><p style="color:var(--ink-dim);">Calibration ${esc(m.nom)} × ${esc(p.profil)} en cours…</p></div>`);
  try{
    const prompt = `Tu es un ghostwriter expert Moment Troc. Tu actives le Maître ${m.nom}.

PROFIL CIBLE : Archétype : ${p.profil}. Organe : ${info.organe}. Mode : ${state.profilMode} (${modeDesc}). Tension : "${p.tension}".
BUSINESS : ${state.biz}.
ATELIER : ${atelierDesc}
FORMAT : ${state.format==='tweet'?'TWEET (60-90 mots, une vérité, pas de suite)':state.format==='thread'?'THREAD (post principal + 4-5 commentaires)':state.format==='courtmetrage'?'COURT MÉTRAGE (150-200 mots, scène, "il" devient "tu")':'PLAN (100-130 mots, étapes, dernière ligne = piège)'}

MÉCANIQUE : T1 (Expérience) → T2 (Rupture) → T3 (Suspension/Mise en lumière : nommer l'état du lecteur) → T4 (Permission + CTA doux, JAMAIS "Tape X", JAMAIS signature, JAMAIS "peace").`;
    const text = await callGemini(prompt, false, 1400);
    const evalMatch = text.match(/AUTOEVAL:\s*(.*)/i);
    let evalText = evalMatch?evalMatch[1].trim():'Auto-évaluation non disponible.';
    state.currentPost = text.replace(/AUTOEVAL:.*/i,'').trim();
    state.evalData = {text:evalText, cls:evalText.startsWith('[OK]')?'green':evalText.startsWith('[FAIBLE]')?'red':''};
    state.stratData = {obs:"Analyse du marché et détection de l'angle mort pour ce profil.",angle:`Activation de l'organe ${info.organe} en mode ${state.profilMode}.`,mecanique:`Mécanique ${m.nom} appliquée.`};
    state.step='result'; renderResult();
  }catch(e){ app.innerHTML+=`<div class="err-box">${esc(e.message)}</div>`; }
};

function renderResult(){
  const ev = state.evalData; const st = state.stratData;
  render(`<div class="eyebrow">Post généré</div><h1>Ton<br><em>missile.</em></h1>
    ${st?`<div class="strat-block">🧠 <strong>Observation :</strong> ${esc(st.obs)}<br>🎯 <strong>Angle mort :</strong> ${esc(st.angle)}<br>⚙️ <strong>Mécanique :</strong> ${esc(st.mecanique)}</div>`:''}
    ${ev?`<div class="eval-band ${ev.cls}"><strong>Auto-évaluation :</strong> ${esc(ev.text)}</div>`:''}
    <div class="card" style="border-top-color:var(--gold);">
      <div class="card-header"><div><span class="tag">${esc(state.profilData.profil)}</span><span class="tag gold">Atelier ${state.atelier}</span></div></div>
      <div class="post-body">${esc(state.currentPost)}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(state.currentPost)},this)">Copier</button>
        <button class="btn btn-ghost" onclick="state.step='pantheon';renderPantheon();">Nouveau Maître</button>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="state.step='brief';renderBrief();">← Nouveau brief</button>`);
}

/* ═══════════════════════════════════════
   MODE DÉCONSTRUCTION
   ═══════════════════════════════════════ */
function renderDeconstruction() {
  render(`<div class="eyebrow">Mode Déconstruction</div><h1>L'agent<br><em>dissèque.</em></h1><p class="sub">Colle un post. L'agent révèle la mécanique cachée, les angles morts, et génère un contre-angle calibré.</p>
    <div class="field"><div class="flabel">Le post à déconstruire</div><textarea id="dc-post" rows="8" maxlength="2000" placeholder="Colle ici le post complet à analyser..."></textarea></div>
    <div class="field"><div class="flabel">Contexte <span class="opt">optionnel</span></div><textarea id="dc-contexte" rows="2" maxlength="300" placeholder="Qui a écrit ce post ? Dans quel secteur ?"></textarea></div>
    <div class="field"><div class="flabel">Sous-angle d'analyse</div>
      <div class="sgrid">
        <div class="sitem on" data-dcmode="profil" onclick="document.querySelectorAll('[data-dcmode]').forEach(e=>e.classList.remove('on')); this.classList.add('on');"><div class="sname">Angle Profil</div><div class="sdesc">Diagnostic pur. Quel organe est activé.</div></div>
        <div class="sitem" data-dcmode="marche" onclick="document.querySelectorAll('[data-dcmode]').forEach(e=>e.classList.remove('on')); this.classList.add('on');"><div class="sname">Angle Marché</div><div class="sdesc">Scan stratégique. Positionnement vs concurrence.</div></div>
        <div class="sitem" data-dcmode="atelier" onclick="document.querySelectorAll('[data-dcmode]').forEach(e=>e.classList.remove('on')); this.classList.add('on');"><div class="sname">Angle Atelier</div><div class="sdesc">Recyclage. Transformer pour un autre stade.</div></div>
      </div>
    </div>
    <button class="btn btn-main" onclick="runDeconstruction()">Lancer l'autopsie →</button>
    <div id="dc-prog" style="display:none;" class="prog-wrap"><div class="prog-title">Dissection en cours...</div></div>
    <div id="dc-error" style="display:none;"></div>
    <div id="dc-result" style="display:none;"></div>`);
}

window.runDeconstruction = async function() {
  const post = document.getElementById('dc-post').value.trim();
  const contexte = document.getElementById('dc-contexte').value.trim();
  const mode = document.querySelector('[data-dcmode].on')?.getAttribute('data-dcmode') || 'profil';
  if (!post || post.length < 30) { document.getElementById('dc-error').style.display=''; document.getElementById('dc-error').innerHTML='<div class="err-box">⚠ Le post doit faire au moins 30 caractères.</div>'; return; }
  
  document.getElementById('dc-prog').style.display=''; document.getElementById('dc-error').style.display='none'; document.getElementById('dc-result').style.display='none';
  const prompts = {
    profil: `Tu es un analyste Moment Troc. Analyse ce post : "${post}". Contexte : "${contexte}". Donne le profil ciblé, l'organe activé, la mécanique, les angles morts et un verdict.`,
    marche: `Tu es un analyste Moment Troc avec scan web. Analyse ce post : "${post}". Contexte : "${contexte}". Trouve les tendances du marché, les angles saturés et les silences. Donne le profil ciblé, la comparaison marché, les angles morts et un verdict.`,
    atelier: `Tu es un analyste Moment Troc. Analyse ce post : "${post}". Contexte : "${contexte}". Dis à quel atelier (Miroir, Forge, Closing) il appartient et propose un contre-angle pour un autre atelier. Donne le profil ciblé, la mécanique, les angles morts et le contre-angle.`
  };
  try {
    const raw = await callGemini(prompts[mode], mode==='marche', 900);
    const contrePrompt = `Tu es un ghostwriter Moment Troc. Analyse : "${raw}". Post original : "${post}". Génère un contre-angle calibré. T1-T2-T3-T4. JAMAIS signature.`;
    const contreAngle = await callGemini(contrePrompt, false, 800);
    dcState.analyse = raw; dcState.contreAngle = contreAngle;
    document.getElementById('dc-prog').style.display='none'; document.getElementById('dc-result').style.display='';
    document.getElementById('dc-result').innerHTML = `
      <div class="dc-block" style="margin-top:24px;">
        <div class="s-eye">Rapport d'Autopsie</div>
        <div style="font-size:11px;color:var(--ink-mid);line-height:1.9;white-space:pre-wrap;">${esc(raw)}</div>
      </div>
      <div class="dc-block" style="border-top-color:var(--rust);margin-top:20px;">
        <div class="s-eye">Contre-Angle Généré</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.1rem;line-height:1.9;white-space:pre-wrap;color:var(--ink);padding:16px 0;">${esc(contreAngle)}</div>
        <div class="ag">
          <button class="abtn" onclick="copyTxt(${JSON.stringify(contreAngle)},this)">Copier</button>
          <button class="abtn" onclick="state.step='brief'; renderBrief();">→ Exploiter dans le Studio</button>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="renderDeconstruction()" style="margin-top:16px;">← Nouvelle autopsie</button>`;
  } catch(e) {
    document.getElementById('dc-prog').style.display='none'; document.getElementById('dc-error').style.display='';
    document.getElementById('dc-error').innerHTML = `<div class="err-box">⚠ ${esc(e.message)} — Analyse de base uniquement.</div>`;
  }
};

/* ═══════════════════════════════════════
   MODE TROC KIT
   ═══════════════════════════════════════ */
function renderTrocKit() {
  const profils = ['AUTOMATISEUR','OPTIMISEUR_VALEUR','OPTIMISEUR_PRIX','ÉLÉVATEUR','LIBÉRATEUR'];
  render(`<div class="eyebrow">Troc Kit</div><h1>Le script<br><em>qui vend.</em></h1><p class="sub">Génère 4 messages calibrés sur le cerveau de ton prospect. Approche, valeur, relance, objection. Avec l'urgence dosée à son profil.</p>
    ${state.profilData ? `<div class="ok-box" style="margin-bottom:16px;">🧠 Profil détecté dans le Studio : <strong>${esc(state.profilData.profil)}</strong> · Mode ${esc(state.profilData.mode)}. Pré-rempli automatiquement.</div>` : ''}
    <div class="field"><div class="flabel">Ton offre <span class="opt">requis</span></div><textarea id="tk-offre" rows="3" maxlength="400" placeholder="Ce que tu vends, à quel prix, ce que ça change pour l'acheteur...">${esc(tkState.offre)}</textarea></div>
    <div class="field"><div class="flabel">Profil du prospect</div>
      <div class="sgrid">
        ${profils.map(p => `<div class="sitem ${tkState.profil === p ? 'on' : ''}" data-tkp="${p}" onclick="tkState.profil='${p}';renderTrocKit();"><div class="sname">${p.replace('_',' ')}</div></div>`).join('')}
      </div>
    </div>
    <div class="field"><div class="flabel">Mode du prospect</div>
      <div class="sgrid c3">
        <div class="sitem ${tkState.mode==='désir'?'on':''}" onclick="tkState.mode='désir';renderTrocKit();"><div class="sname">🟢 Désir</div></div>
        <div class="sitem ${tkState.mode==='peur'?'on':''}" onclick="tkState.mode='peur';renderTrocKit();"><div class="sname">🔴 Peur</div></div>
      </div>
    </div>
    <button class="btn btn-main" onclick="runTrocKit()">Générer les 4 scripts →</button>
    <div id="tk-prog" style="display:none;" class="prog-wrap"><div class="prog-title">Calibration en cours...</div></div>
    <div id="tk-error" style="display:none;"></div>
    <div id="tk-result" style="display:none;"></div>`);
}

window.runTrocKit = async function() {
  const offre = document.getElementById('tk-offre').value.trim();
  if (!offre || offre.length < 10) { document.getElementById('tk-error').style.display=''; document.getElementById('tk-error').innerHTML='<div class="err-box">⚠ Décris ton offre plus précisément.</div>'; return; }
  tkState.offre = offre;
  document.getElementById('tk-prog').style.display=''; document.getElementById('tk-error').style.display='none'; document.getElementById('tk-result').style.display='none';
  
  const urg = {
    AUTOMATISEUR: {style:'organisationnelle', regle:'Urgence de planning. Pas de pression émotionnelle.'},
    OPTIMISEUR_VALEUR: {style:'mathématique', regle:'Urgence de rentabilité. Chaque jour perdu coûte.'},
    OPTIMISEUR_PRIX: {style:'transparente', regle:'Le prix est juste, il ne changera pas.'},
    ÉLÉVATEUR: {style:'sociale', regle:'La porte se ferme. Les autres y sont déjà.'},
    LIBÉRATEUR: {style:'inexistante', regle:'Aucune deadline. Juste une conversation.'},
    PEUR: {style:'rassurante', regle:'La pression est interne. La porte est là, sans menace.'}
  };
  const key = tkState.mode==='peur'?'PEUR':tkState.profil;
  const dosage = urg[key] || urg.AUTOMATISEUR;
  
  try {
    const prompt = `Tu es un expert en vente comportementale Moment Troc. Offre : "${offre}". Profil : ${tkState.profil}. Mode : ${tkState.mode}. Urgence : ${dosage.style} — ${dosage.regle}. Génère 4 messages séparés par "---SEP---" : 1) Approche 2) Valeur 3) Relance 48h 4) Objection. Chaque message = Mise en Lumière + Permission + CTA doux. JAMAIS "Tape X", JAMAIS signature.`;
    const raw = await callGemini(prompt, false, 1200);
    const scripts = raw.split('---SEP---').map(s=>s.trim()).filter(Boolean);
    tkState.scripts = scripts;
    document.getElementById('tk-prog').style.display='none'; document.getElementById('tk-result').style.display='';
    document.getElementById('tk-result').innerHTML = `
      <div class="info-box" style="margin-bottom:16px;">⚡ Urgence calibrée : <strong>${dosage.style}</strong> — ${dosage.regle}</div>
      ${scripts.map(s => `<div class="tk-msg"><div class="tk-body">${esc(s)}</div><button class="abtn" onclick="copyTxt(${JSON.stringify(s)},this)">Copier</button></div>`).join('')}
      <button class="btn btn-ghost" onclick="renderTrocKit()" style="margin-top:16px;">← Modifier</button>`;
  } catch(e) {
    document.getElementById('tk-prog').style.display='none'; document.getElementById('tk-error').style.display='';
    document.getElementById('tk-error').innerHTML = `<div class="err-box">⚠ ${esc(e.message)} — scripts de secours générés.</div>`;
    const fallback = [`Salut. Mon post t'a parlé ? DM si tu veux en discuter.`, `Un chiffre : [X] clients en [Y] semaines. DM pour savoir comment.`, `Salut. L'offre est toujours là. DM si tu veux en parler.`, `Je comprends ton hésitation. Prends ton temps. DM si tu as des questions.`];
    document.getElementById('tk-result').style.display='';
    document.getElementById('tk-result').innerHTML = fallback.map(s => `<div class="tk-msg"><div class="tk-body">${esc(s)}</div></div>`).join('');
  }
};

// ─── INIT ───
window.onload = function(){
  const mk = getMomentKey();
  if(!mk||(mk!==MASTER_KEY&&!VALID_KEYS.includes(mk))){ state.step='unlock'; }
  else if(!getGeminiKey()){ state.step='gemini'; }
  else { state.step='brief'; }
  renderStudioMode();
};
</script>
